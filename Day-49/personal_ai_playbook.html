<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal AI Playbook — Developer Prompt System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0B2239;
  --bg-elevated:#0F2B45;
  --bg-card:#123049;
  --bg-hover:#173a58;
  --grid-line:rgba(94,200,216,0.07);
  --border:rgba(94,200,216,0.18);
  --border-strong:rgba(94,200,216,0.35);
  --text-primary:#E8F1F8;
  --text-secondary:#9FB8CC;
  --text-tertiary:#6E8AA0;
  --accent-amber:#E8A94C;
  --accent-amber-dim:rgba(232,169,76,0.14);
  --accent-cyan:#5EC8D8;
  --accent-cyan-dim:rgba(94,200,216,0.14);
  --success:#6FCF97;
  --success-dim:rgba(111,207,151,0.14);
  --danger:#E5674A;
  --danger-dim:rgba(229,103,74,0.14);
  --shadow:0 8px 30px rgba(0,0,0,0.35);
  --radius:10px;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}
[data-theme="light"]{
  --bg:#F1F5F9;
  --bg-elevated:#FFFFFF;
  --bg-card:#FFFFFF;
  --bg-hover:#EAF0F6;
  --grid-line:rgba(11,34,57,0.05);
  --border:rgba(11,34,57,0.12);
  --border-strong:rgba(11,34,57,0.24);
  --text-primary:#0B2239;
  --text-secondary:#3E5A70;
  --text-tertiary:#6E8AA0;
  --accent-amber:#B8720F;
  --accent-amber-dim:rgba(184,114,15,0.10);
  --accent-cyan:#137A8C;
  --accent-cyan-dim:rgba(19,122,140,0.10);
  --success:#1E8A56;
  --success-dim:rgba(30,138,86,0.10);
  --danger:#C6432A;
  --danger-dim:rgba(198,67,42,0.10);
  --shadow:0 8px 30px rgba(11,34,57,0.10);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background-color:var(--bg);
  background-image:
    radial-gradient(var(--grid-line) 1px, transparent 1px);
  background-size:22px 22px;
  color:var(--text-primary);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.55;
  min-height:100vh;
  transition:background-color .25s ease, color .25s ease;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; letter-spacing:-0.01em;}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit; color:var(--text-primary);}
::selection{background:var(--accent-cyan); color:#04141f;}
a{color:var(--accent-cyan);}
:focus-visible{outline:2px solid var(--accent-cyan); outline-offset:2px;}
.mono{font-family:var(--font-mono);}
.scrollbar-thin::-webkit-scrollbar{width:8px; height:8px;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:4px;}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent;}

/* ---------- Layout shell ---------- */
#app{display:flex; min-height:100vh;}

.sidebar{
  width:236px; flex-shrink:0;
  background:var(--bg-elevated);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  padding:20px 14px;
  position:sticky; top:0; height:100vh;
}
.brand{
  display:flex; align-items:center; gap:10px;
  padding:6px 8px 20px 8px;
}
.brand-mark{
  width:32px; height:32px; border-radius:7px;
  background:linear-gradient(135deg, var(--accent-cyan), var(--accent-amber));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-weight:600; color:#04141f; font-size:13px;
  flex-shrink:0;
}
.brand-text{display:flex; flex-direction:column; line-height:1.2;}
.brand-text .name{font-family:var(--font-display); font-size:14.5px; font-weight:600;}
.brand-text .tag{font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);}

.nav-section-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em;
  color:var(--text-tertiary); padding:14px 10px 6px 10px; font-family:var(--font-mono);
}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; border-radius:8px;
  color:var(--text-secondary); font-size:13.5px; font-weight:500;
  background:none; border:none; width:100%; text-align:left;
  transition:background .15s ease, color .15s ease;
}
.nav-item:hover{background:var(--bg-hover); color:var(--text-primary);}
.nav-item.active{background:var(--accent-cyan-dim); color:var(--accent-cyan);}
.nav-item .icon{width:16px; text-align:center; flex-shrink:0; font-size:14px;}
.nav-item .count{
  margin-left:auto; font-family:var(--font-mono); font-size:10.5px;
  color:var(--text-tertiary); background:var(--bg-hover); padding:1px 6px; border-radius:20px;
}
.sidebar-footer{margin-top:auto; display:flex; flex-direction:column; gap:6px; padding-top:10px; border-top:1px solid var(--border);}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; gap:12px;
  padding:14px 28px; border-bottom:1px solid var(--border);
  background:var(--bg-elevated); position:sticky; top:0; z-index:20;
}
.search-wrap{
  flex:1; max-width:420px; display:flex; align-items:center; gap:8px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  padding:8px 12px; color:var(--text-tertiary);
}
.search-wrap input{
  background:none; border:none; outline:none; flex:1; color:var(--text-primary); font-size:13.5px;
}
kbd{
  font-family:var(--font-mono); font-size:10.5px; background:var(--bg-hover);
  border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-tertiary);
}
.icon-btn{
  width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-secondary); font-size:15px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:background .15s ease, color .15s ease, border-color .15s ease;
}
.icon-btn:hover{background:var(--bg-hover); color:var(--text-primary); border-color:var(--border-strong);}
.content{padding:26px 28px 60px 28px; max-width:1180px; width:100%; margin:0 auto;}

/* ---------- Explainer banner ---------- */
.explainer-banner{
  position:relative;
  border:1px solid var(--border-strong);
  background:linear-gradient(135deg, var(--accent-cyan-dim), var(--accent-amber-dim));
  border-radius:var(--radius);
  padding:16px 44px 16px 18px;
  margin-bottom:22px;
  font-size:13.5px; color:var(--text-secondary);
}
.explainer-banner strong{color:var(--text-primary);}
.explainer-banner .close-x{
  position:absolute; top:10px; right:10px; background:none; border:none;
  color:var(--text-tertiary); font-size:16px; width:26px; height:26px; border-radius:6px;
}
.explainer-banner .close-x:hover{background:rgba(0,0,0,0.08); color:var(--text-primary);}

/* ---------- Cards / signature corner-bracket style ---------- */
.page-header{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap;}
.page-header h1{font-size:22px; margin-bottom:4px;}
.page-header .subtitle{color:var(--text-secondary); font-size:13.5px; max-width:560px;}
.eyebrow{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.09em; text-transform:uppercase;
  color:var(--accent-cyan); margin-bottom:6px; display:block;
}

.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 15px; border-radius:8px; font-size:13px; font-weight:600;
  border:1px solid var(--border); background:var(--bg-card); color:var(--text-primary);
  transition:all .15s ease; white-space:nowrap;
}
.btn:hover{background:var(--bg-hover); border-color:var(--border-strong);}
.btn-primary{background:var(--accent-cyan); border-color:var(--accent-cyan); color:#04141f;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:none; border-color:transparent;}
.btn-ghost:hover{background:var(--bg-hover);}
.btn-sm{padding:6px 10px; font-size:12px;}
.btn-danger{color:var(--danger);}

.stat-row{display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:14px; margin-bottom:26px;}
.stat-card{
  position:relative; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 16px 14px 16px;
}
.stat-card::before, .stat-card::after{
  content:""; position:absolute; width:9px; height:9px; border-color:var(--accent-cyan); opacity:.55;
}
.stat-card::before{top:6px; left:6px; border-top:2px solid; border-left:2px solid;}
.stat-card::after{bottom:6px; right:6px; border-bottom:2px solid; border-right:2px solid;}
.stat-card .num{font-family:var(--font-display); font-size:26px; font-weight:700;}
.stat-card .lbl{font-size:12px; color:var(--text-secondary); margin-top:2px;}

.section-label{font-family:var(--font-mono); font-size:11px; letter-spacing:0.07em; text-transform:uppercase; color:var(--text-tertiary); margin:26px 0 12px 0;}

.card{
  position:relative; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px; transition:border-color .15s ease, transform .15s ease;
}
.card::before, .card::after{
  content:""; position:absolute; width:10px; height:10px; opacity:.4; border-color:var(--accent-amber); pointer-events:none;
}
.card::before{top:-1px; left:-1px; border-top:2px solid; border-left:2px solid; border-top-left-radius:3px;}
.card::after{bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid; border-bottom-right-radius:3px;}
.card:hover{border-color:var(--border-strong);}

.workflow-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(290px,1fr)); gap:14px;}
.wf-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
.wf-cat-pill{
  font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:0.05em;
  padding:3px 8px; border-radius:20px; background:var(--accent-cyan-dim); color:var(--accent-cyan);
  display:inline-block; margin-bottom:8px;
}
.wf-cat-pill.cat-debug{background:var(--danger-dim); color:var(--danger);}
.wf-cat-pill.cat-design{background:var(--accent-amber-dim); color:var(--accent-amber);}
.fav-btn{background:none; border:none; font-size:16px; color:var(--text-tertiary); line-height:1; padding:2px;}
.fav-btn.active{color:var(--accent-amber);}
.wf-title{font-size:15px; font-weight:600; margin-bottom:5px; font-family:var(--font-display);}
.wf-desc{font-size:12.5px; color:var(--text-secondary); margin-bottom:12px; min-height:32px;}
.wf-actions{display:flex; gap:6px; flex-wrap:wrap; border-top:1px solid var(--border); padding-top:12px;}

.empty-state{
  text-align:center; padding:60px 20px; color:var(--text-secondary); border:1px dashed var(--border-strong); border-radius:var(--radius);
}
.empty-state .icon{font-size:28px; margin-bottom:10px; opacity:.6;}
.empty-state h3{font-size:15px; color:var(--text-primary); margin-bottom:6px;}
.empty-state p{font-size:13px; max-width:360px; margin:0 auto;}

/* ---------- Builder layout ---------- */
.builder-layout{display:grid; grid-template-columns:1fr 420px; gap:20px; align-items:start;}
@media (max-width:980px){ .builder-layout{grid-template-columns:1fr;} }

.block-picker{display:flex; flex-direction:column; gap:10px;}
.block-option{
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px;
}
.block-option-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px;}
.block-option-head .name{font-weight:600; font-size:14px; font-family:var(--font-display);}
.block-option .why{font-size:12px; color:var(--text-secondary); margin-bottom:10px; line-height:1.5;}
.block-option select, .block-option textarea, .block-option input[type=text]{
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:9px 10px;
  color:var(--text-primary); font-size:13px;
}
.block-option textarea{resize:vertical; min-height:64px;}
.checkbox-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
.checkbox-chip{
  display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--border);
  border-radius:20px; padding:5px 11px; font-size:12px; color:var(--text-secondary);
}
.checkbox-chip input{accent-color:var(--accent-cyan);}
.badge-num{
  font-family:var(--font-mono); font-size:10.5px; color:var(--text-tertiary); background:var(--bg);
  border:1px solid var(--border); border-radius:5px; padding:1px 6px;
}

.preview-panel{
  position:sticky; top:78px; background:var(--bg-card); border:1px solid var(--border-strong); border-radius:var(--radius);
  padding:16px; max-height:calc(100vh - 100px); display:flex; flex-direction:column;
}
.preview-panel h3{font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
.preview-text{
  flex:1; overflow-y:auto; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:14px; font-family:var(--font-mono); font-size:12.3px; white-space:pre-wrap; line-height:1.6;
  color:var(--text-primary); min-height:200px; max-height:420px;
}
.preview-footer{display:flex; gap:8px; margin-top:12px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(3,12,20,0.6); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal{
  background:var(--bg-elevated); border:1px solid var(--border-strong); border-radius:14px;
  max-width:560px; width:100%; max-height:86vh; overflow-y:auto; box-shadow:var(--shadow);
  padding:28px;
}
.modal.modal-lg{max-width:720px;}
.modal-close{position:absolute; top:16px; right:16px;}
.modal h2{font-size:19px; margin-bottom:6px;}
.modal .modal-sub{color:var(--text-secondary); font-size:13px; margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--text-secondary);}
.field .hint{font-size:11.5px; color:var(--text-tertiary); margin-top:4px;}
.field input[type=text], .field textarea, .field select{
  width:100%; background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; font-size:13.5px; color:var(--text-primary);
}
.field textarea{resize:vertical; min-height:80px; font-family:var(--font-mono); font-size:12.5px;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

.onboard-steps{display:flex; flex-direction:column; gap:16px; margin:18px 0 22px 0;}
.onboard-step{display:flex; gap:12px;}
.onboard-step .n{
  width:26px; height:26px; border-radius:7px; background:var(--accent-cyan-dim); color:var(--accent-cyan);
  font-family:var(--font-mono); font-weight:600; font-size:12.5px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.onboard-step .t{font-size:13.5px; font-weight:600; margin-bottom:2px;}
.onboard-step .d{font-size:12.5px; color:var(--text-secondary);}

/* ---------- Toast ---------- */
.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(0);
  background:var(--bg-elevated); border:1px solid var(--border-strong); color:var(--text-primary);
  padding:11px 18px; border-radius:9px; font-size:13px; box-shadow:var(--shadow); z-index:200;
  display:flex; align-items:center; gap:8px; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}
.toast .dot{width:7px; height:7px; border-radius:50%; background:var(--success);}

.shortcuts-list{display:flex; flex-direction:column; gap:9px;}
.shortcuts-list .row{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--text-secondary);}

.settings-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:700px){ .settings-grid{grid-template-columns:1fr;} .builder-layout{grid-template-columns:1fr;} .preview-panel{position:static;} }

.tag-list{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
.tag{font-family:var(--font-mono); font-size:10.5px; color:var(--text-tertiary); background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:2px 7px;}

.filter-bar{display:flex; gap:8px; align-items:center; margin-bottom:18px; flex-wrap:wrap;}
.filter-chip{
  font-size:12px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card);
  color:var(--text-secondary);
}
.filter-chip.active{background:var(--accent-cyan-dim); color:var(--accent-cyan); border-color:var(--border-strong);}

.var-inputs{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
.var-inputs .field input, .var-inputs .field textarea{font-family:var(--font-mono); font-size:12.5px;}

.help-text-block{font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:12px;}
.divider{height:1px; background:var(--border); margin:18px 0;}
</style>
</head>
<body data-theme="dark">
<div id="app"></div>
<div id="toast" class="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script>
/* =========================================================
   DATA
========================================================= */
const STORAGE_KEYS = {
  workflows: 'aiplaybook_workflows_v1',
  settings: 'aiplaybook_settings_v1',
  onboarded: 'aiplaybook_onboarded_v1',
  bannerDismissed: 'aiplaybook_banner_dismissed_v1'
};

const CATEGORY_META = {
  learning: {label:'Learning New Tech', cls:''},
  design: {label:'System Design', cls:'cat-design'},
  debug: {label:'Debugging', cls:'cat-debug'}
};

function defaultWorkflows(){
  return [
    {
      id:'wf_1', category:'learning', favorite:true,
      title:'First-Principles Framework Onboarding',
      desc:'Get a grounded, non-generic intro to a new language or framework based on what you already know.',
      tags:['onboarding','new-tech'],
      template:`You are a senior engineer who has shipped production code in {{framework}}.

OBJECTIVE: Teach me {{framework}} assuming I already know {{background}}. Don't re-explain concepts I already know from {{background}} — map new ideas onto that knowledge instead.

Cover, in order:
1. The one or two ideas that make {{framework}} different from what I already know
2. A minimal working example I can run in under 5 minutes
3. The most common mistake beginners coming from {{background}} make, and why

Depth: {{depth_level}}

End with 3 follow-up questions I should ask you next.`,
      variables:[
        {key:'framework', label:'Framework / language', placeholder:'e.g. Rust'},
        {key:'background', label:'What you already know', placeholder:'e.g. Python and JavaScript'},
        {key:'depth_level', label:'Depth level', placeholder:'e.g. practical enough to build a small CLI tool'}
      ],
      bestPractices:[
        'Name your actual background stack — generic "I know programming" produces generic answers.',
        'Ask for the minimal example first; expand only into what you actually need.',
        'Save the "common mistake" answer — it\\'s usually reusable across similar tools.'
      ]
    },
    {
      id:'wf_2', category:'learning', favorite:false,
      title:'Concept Deep-Dive with Analogy',
      desc:'Turn an abstract concept into something that sticks, using an analogy from a domain you understand.',
      tags:['concept','retention'],
      template:`ROLE: Patient technical mentor.

OBJECTIVE: Explain {{concept}} so it actually sticks — not just a definition.

STRATEGY: Build one central analogy rooted in {{familiar_domain}}, then map every part of {{concept}} onto that analogy explicitly. Point out exactly where the analogy breaks down, so I don't over-extend it.

OUTPUT FORMAT:
- The analogy (2-3 sentences)
- Mapping table: concept part -> analogy part
- Where the analogy breaks down
- One sentence I can say out loud to check if I truly understood it`,
      variables:[
        {key:'concept', label:'Concept to learn', placeholder:'e.g. event loops'},
        {key:'familiar_domain', label:'A domain you understand well', placeholder:'e.g. restaurant kitchens'}
      ],
      bestPractices:[
        'Pick an analogy domain you actually have lived experience in — it improves retention far more than a generic one.',
        'Always ask explicitly where the analogy breaks — this prevents you from carrying a wrong mental model forward.'
      ]
    },
    {
      id:'wf_3', category:'learning', favorite:false,
      title:'Compare Two Approaches Before Committing',
      desc:'Force a real trade-off comparison instead of a single generic recommendation.',
      tags:['comparison','decision'],
      template:`OBJECTIVE: I'm deciding between {{option_a}} and {{option_b}} for {{use_case}}.

REASONING STRATEGY: Consider both seriously on their own merits before comparing. Do not default to the more popular option just because it's more popular.

OUTPUT FORMAT: Comparison table across these dimensions: {{dimensions}}. Then a one-paragraph recommendation for MY specific use case, explicitly stating what would change your recommendation.

CONSTRAINT: If the honest answer is "it depends," tell me exactly what it depends on.`,
      variables:[
        {key:'option_a', label:'Option A', placeholder:'e.g. REST'},
        {key:'option_b', label:'Option B', placeholder:'e.g. GraphQL'},
        {key:'use_case', label:'Your use case', placeholder:'e.g. a mobile app with spotty connectivity'},
        {key:'dimensions', label:'Dimensions to compare', placeholder:'e.g. latency, caching, dev speed'}
      ],
      bestPractices:[
        'Always name your specific use case — "which is better" without context is the #1 cause of shallow answers.',
        'Ask explicitly what would flip the recommendation; it reveals the real trade-off.'
      ]
    },
    {
      id:'wf_4', category:'design', favorite:true,
      title:'System Design Trade-off Session',
      desc:'Work through a system design problem with explicit trade-offs instead of one "correct" answer.',

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 2200);
}
function copyText(text, label){
  navigator.clipboard.writeText(text).then(()=> toast((label||'Copied') + ' to clipboard')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); toast((label||'Copied') + ' to clipboard');
  });
}

function renderBlockOption(block, stateObj, customObj, checksObj){
  let inner = '';
  if(block.type === 'select-custom'){
    const current = stateObj[block.key] ?? '';
    inner = `
      <select data-pbfield="${block.key}" data-kind="select">
        <option value="">— choose an option —</option>
        ${block.options.map(o=>`<option value="${escapeAttr(o)}" ${current===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
        <option value="__custom__" ${current==='__custom__'?'selected':''}>Custom...</option>
      </select>
      ${current==='__custom__' ? `<textarea data-pbfield="${block.key}" data-kind="custom" placeholder="Write your own ${block.label.toLowerCase()}...">${escapeHtml(customObj[block.key]||'')}</textarea>` : ''}
    `;
  } else if(block.type === 'textarea'){
    inner = `<textarea data-pbfield="${block.key}" data-kind="text" placeholder="${escapeAttr(block.placeholder||'')}">${escapeHtml(stateObj[block.key]||'')}</textarea>`;
  } else if(block.type === 'checkbox'){
    inner = `<div class="checkbox-row">${block.options.map((o,i)=>{
      const checked = (checksObj[block.key]||[]).includes(o);
      return `<label class="checkbox-chip"><input type="checkbox" data-pbcheck="${block.key}" value="${escapeAttr(o)}" ${checked?'checked':''}> ${escapeHtml(o)}</label>`;
    }).join('')}</div>`;
  }
  return `
    <div class="block-option">
      <div class="block-option-head">
        <span class="name">${block.icon} ${block.label}</span>
        <span class="badge-num">${block.key}</span>
      </div>
      <div class="why">${escapeHtml(block.why)}</div>
      ${inner}
    </div>
  `;
}

function assembledPrompt(blocks, stateObj, customObj, checksObj, kind){
  const lines = [];
  blocks.forEach(b=>{
    let val = '';
    if(b.type==='select-custom'){
      val = stateObj[b.key]==='__custom__' ? (customObj[b.key]||'') : (stateObj[b.key]||'');
    } else if(b.type==='textarea'){
      val = stateObj[b.key]||'';
    } else if(b.type==='checkbox'){
      val = (checksObj[b.key]||[]).map(x=>'- '+x).join('\\n');
    }
    if(val && val.trim()){
      lines.push(`${b.label.toUpperCase()}:\\n${val.trim()}`);
    }
  });
  if(!lines.length) return kind==='loop'
    ? 'Fill in the blocks on the left — your assembled loop prompt will build itself here.'
    : 'Fill in the blocks on the left — your assembled prompt will build itself here.';
  return lines.join('\\n\\n');
}

          <button class="btn btn-primary" style="flex:1" data-action="copy-pb">⧉ Copy prompt</button>
          <button class="btn" data-action="save-pb">Save as workflow</button>
        </div>
      </div>
    </div>
  `;
}

/* =========================================================
   LOOP BUILDER
========================================================= */
function renderLoopBuilder(){
  return `
    <div class="page-header">
      <div>
        <span class="eyebrow">Loop Builder</span>
        <h1>Turn a prompt into an autonomous loop</h1>
        <div class="subtitle">"Loop" here means Claude repeatedly attempts, evaluates, and improves its own answer until your stop condition is met — without you re-prompting each time.</div>
      </div>
      <button class="btn btn-ghost" data-action="reset-lb">Reset</button>
    </div>
    <div class="builder-layout">
      <div class="block-picker">
        ${LOOP_BLOCKS.map(b => renderBlockOption(b, state.lb, state.lbCustom, state.lbChecks)).join('')}
      </div>
      <div class="preview-panel">
        <h3>◈ Live preview</h3>
        <div class="preview-text" id="lbPreview">${escapeHtml(buildLoopPreview())}</div>
        <div class="preview-footer">
          <button class="btn btn-primary" style="flex:1" data-action="copy-lb">⧉ Copy loop prompt</button>
          <button class="btn" data-action="save-lb">Save as workflow</button>
        </div>
      </div>
    </div>
  `;
}

function buildLoopPreview(){
  const g = state.lb['goal'] || '';
  const evalv = state.lb['evaluation']==='__custom__' ? (state.lbCustom['evaluation']||'') : (state.lb['evaluation']||'');
  const imp = state.lb['improvement']==='__custom__' ? (state.lbCustom['improvement']||'') : (state.lb['improvement']||'');
  const stop = state.lb['stop']==='__custom__' ? (state.lbCustom['stop']||'') : (state.lb['stop']||'');
  const safety = (state.lbChecks['safety']||[]);
  if(!g && !evalv && !imp && !stop && !safety.length){
    return 'Fill in the blocks on the left — your assembled loop prompt will build itself here.';
  }
  let out = `GOAL:\\n${g||'(not set)'}\\n\\n`;
  out += `Work in iterative loops to achieve the goal above. For each loop:\\n`;
  out += `1. Produce your best attempt.\\n`;
  out += `2. Evaluate it against: ${evalv||'(not set)'}\\n`;
  out += `3. If it falls short, apply this improvement strategy: ${imp||'(not set)'}\\n`;
  out += `4. Repeat.\\n\\n`;
  out += `STOP CONDITION:\\n${stop||'(not set)'}\\n\\n`;
  out += `SAFETY RULES:\\n${safety.length ? safety.map(s=>'- '+s).join('\\n') : '(none selected)'}\\n\\n`;
  out += `Begin with iteration 1 now.`;
  return out;
}

/* =========================================================

function openModal(html){
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay';
  wrap.id = 'modalOverlay';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  wrap.addEventListener('click', (e)=>{ if(e.target === wrap) closeModal(); });
  bindModalEvents(wrap);
}
function closeModal(){
  const el = document.getElementById('modalOverlay');
  if(el) el.remove();
}

function useWorkflowModalHtml(w){
  const vars = extractVars(w.template);
  const values = w._runValues || {};
  return `

      <button class="icon-btn modal-close" data-action="close-modal">✕</button>

function extractVars(template){
  const matches = [...(template||'').matchAll(/{{\\s*([a-zA-Z0-9_]+)\\s*}}/g)];
  return [...new Set(matches.map(m=>m[1]))];
}
function renderTemplate(template, values){
  return (template||'').replace(/{{\\s*([a-zA-Z0-9_]+)\\s*}}/g, (m, key) => values[key] ? values[key] : m);
}

/* =========================================================
   EVENTS
========================================================= */
function bindModalEvents(root){
  root.querySelectorAll('[data-action="close-modal"]').forEach(b=>b.addEventListener('click', closeModal));
  const onboardBtn = root.querySelector('[data-action="close-onboarding"]');
  if(onboardBtn) onboardBtn.addEventListener('click', ()=>{ save(STORAGE_KEYS.onboarded, true); closeModal(); });

  const saveWfBtn = root.querySelector('[data-action="save-new-workflow"]');
  if(saveWfBtn){
    saveWfBtn.addEventListener('click', ()=>{
      const id = saveWfBtn.getAttribute('data-id');
      const title = document.getElementById('wfTitle').value.trim();
      const category = document.getElementById('wfCategory').value;
      const desc = document.getElementById('wfDesc').value.trim();
      const tags = document.getElementById('wfTags').value.split(',').map(t=>t.trim()).filter(Boolean);
      const template = document.getElementById('wfTemplate').value;
      if(!title){ toast('Please add a title'); return; }
      const vars = extractVars(template).map(v=>({key:v, label:v, placeholder:''}));
      if(id){
        const w = state.workflows.find(x=>x.id===id);
        Object.assign(w, {title, category, desc, tags, template, variables:vars});
      } else {
        state.workflows.unshift({id:uid(), category, title, desc, tags, template, variables:vars, favorite:false, bestPractices:[]});
      }
      save(STORAGE_KEYS.workflows, state.workflows);
      closeModal();
      render();
      toast('Workflow saved');
    });
  }

  root.querySelectorAll('[data-runvar]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const id = root.querySelector('[data-action="copy-rendered"]')?.getAttribute('data-id');
      const w = state.workflows.find(x=>x.id===id);
      if(!w) return;
      w._runValues = w._runValues || {};
      w._runValues[inp.getAttribute('data-runvar')] = inp.value;
      document.getElementById('wfRendered').textContent = renderTemplate(w.template, w._runValues);
    });
  });

  const copyRenderedBtn = root.querySelector('[data-action="copy-rendered"]');
  if(copyRenderedBtn){
    copyRenderedBtn.addEventListener('click', ()=>{
      const id = copyRenderedBtn.getAttribute('data-id');
      const w = state.workflows.find(x=>x.id===id);
      copyText(renderTemplate(w.template, w._runValues||{}), 'Prompt');
    });
  }
}

function bindGlobalEvents(){
  const app = document.getElementById('app');

  // Navigation
  app.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.view = el.getAttribute('data-nav'); render(); });
  });

  // Search
  const searchInput = document.getElementById('globalSearch');
  if(searchInput){
    searchInput.addEventListener('input', ()=>{
      state.search = searchInput.value;
      if(state.view !== 'library'){ state.view = 'library'; }
      render();
      setTimeout(()=>{
        const s = document.getElementById('globalSearch');
        if(s){ s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
      },0);
    });
  }

  // Generic action buttons
  app.querySelectorAll('[data-action]').forEach(el=>{
    const action = el.getAttribute('data-action');
    if(['filter-cat'].includes(action)){
      el.addEventListener('click', ()=>{ state.filterCategory = el.getAttribute('data-cat'); render(); });
      return;
    }
    switch(action){
      case 'toggle-theme':
        el.addEventListener('click', ()=>{
          state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
          save(STORAGE_KEYS.settings, state.settings);
          render();
        });
        break;
      case 'open-help':
        el.addEventListener('click', ()=> openModal(helpModalHtml()));
        break;
      case 'dismiss-banner':
        el.addEventListener('click', ()=>{ save(STORAGE_KEYS.bannerDismissed, true); render(); });
        break;
      case 'new-workflow':
        el.addEventListener('click', ()=> openModal(newWorkflowModalHtml(null)));
        break;
      case 'edit-workflow':
        el.addEventListener('click', ()=>{
          const w = state.workflows.find(x=>x.id===el.getAttribute('data-id'));
          openModal(newWorkflowModalHtml(w));
        });
        break;
      case 'use-workflow':
        el.addEventListener('click', ()=>{
          const w = state.workflows.find(x=>x.id===el.getAttribute('data-id'));
          openModal(useWorkflowModalHtml(w));
        });
        break;
      case 'dup-workflow':
        el.addEventListener('click', ()=>{
          const w = state.workflows.find(x=>x.id===el.getAttribute('data-id'));
          const copy = JSON.parse(JSON.stringify(w));
          copy.id = uid(); copy.title = w.title + ' (copy)'; copy.favorite = false;
          state.workflows.unshift(copy);
          save(STORAGE_KEYS.workflows, state.workflows);
          render();
          toast('Workflow duplicated');
        });
        break;
      case 'del-workflow':
        el.addEventListener('click', ()=>{
          if(!confirm('Delete this workflow? This cannot be undone.')) return;
          state.workflows = state.workflows.filter(x=>x.id!==el.getAttribute('data-id'));
          save(STORAGE_KEYS.workflows, state.workflows);
          render();
          toast('Workflow deleted');
        });
        break;
      case 'toggle-fav':
        el.addEventListener('click', ()=>{
          const w = state.workflows.find(x=>x.id===el.getAttribute('data-id'));
          w.favorite = !w.favorite;
          save(STORAGE_KEYS.workflows, state.workflows);
          render();
        });
        break;
      case 'toggle-filter-fav':
        el.addEventListener('click', ()=>{ state.filterFavorite = !state.filterFavorite; render(); });
        break;
      case 'export-data':
        el.addEventListener('click', ()=>{
          const blob = new Blob([JSON.stringify({workflows:state.workflows, settings:state.settings}, null, 2)], {type:'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'ai-playbook-backup.json'; a.click();
          URL.revokeObjectURL(url);
          toast('Exported backup');
        });
        break;
      case 'import-data':
        el.addEventListener('click', ()=>{
          const input = document.createElement('input'); input.type='file'; input.accept='.json';
          input.addEventListener('change', ()=>{
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = () => {
              try{
                const data = JSON.parse(reader.result);
                if(data.workflows) state.workflows = data.workflows;
                if(data.settings) state.settings = data.settings;
                save(STORAGE_KEYS.workflows, state.workflows);
                save(STORAGE_KEYS.settings, state.settings);
                render();
                toast('Import successful');
              }catch(e){ toast('Import failed — invalid file'); }
            };
            reader.readAsText(file);
          });
          input.click();
        });
        break;
      case 'reset-data':
        el.addEventListener('click', ()=>{
          if(!confirm('Reset your library to the default 9 workflows? Custom workflows will be lost.')) return;
          state.workflows = defaultWorkflows();
          save(STORAGE_KEYS.workflows, state.workflows);
          render();
          toast('Library reset to defaults');
        });
        break;
      case 'reset-pb':
        el.addEventListener('click', ()=>{ state.pb={}; state.pbCustom={}; state.pbChecks={}; render(); });
        break;
      case 'reset-lb':
        el.addEventListener('click', ()=>{ state.lb={}; state.lbCustom={}; state.lbChecks={}; render(); });
        break;
      case 'copy-pb':
        el.addEventListener('click', ()=> copyText(assembledPrompt(PROMPT_BLOCKS, state.pb, state.pbCustom, state.pbChecks, 'prompt'), 'Prompt'));
        break;
      case 'copy-lb':
        el.addEventListener('click', ()=> copyText(buildLoopPreview(), 'Loop prompt'));
        break;
      case 'save-pb':
        el.addEventListener('click', ()=>{
          const text = assembledPrompt(PROMPT_BLOCKS, state.pb, state.pbCustom, state.pbChecks, 'prompt');
          state.workflows.unshift({id:uid(), category:'learning', title:'Custom prompt ('+new Date().toLocaleDateString()+')', desc:'Built with the Prompt Builder', tags:['custom'], template:text, variables:[], favorite:false, bestPractices:[]});
          save(STORAGE_KEYS.workflows, state.workflows);
          toast('Saved to My Workflows');
        });
        break;
      case 'save-lb':
        el.addEventListener('click', ()=>{
          const text = buildLoopPreview();
          state.workflows.unshift({id:uid(), category:'learning', title:'Custom loop ('+new Date().toLocaleDateString()+')', desc:'Built with the Loop Builder', tags:['custom','loop'], template:text, variables:[], favorite:false, bestPractices:[]});
          save(STORAGE_KEYS.workflows, state.workflows);
          toast('Saved to My Workflows');
        });
        break;
    }
  });

  // Prompt builder field binding
  app.querySelectorAll('[data-pbfield]').forEach(el=>{
    el.addEventListener('input', ()=> handleBuilderField(el, 'pb'));
    el.addEventListener('change', ()=> handleBuilderField(el, 'pb'));
  });
  app.querySelectorAll('[data-pbcheck]').forEach(el=>{
    el.addEventListener('change', ()=> handleBuilderCheck(el, 'pb'));
  });
  app.querySelectorAll('[data-lbfield]').forEach(el=>{
    el.addEventListener('input', ()=> handleBuilderField(el, 'lb'));
    el.addEventListener('change', ()=> handleBuilderField(el, 'lb'));
  });

  // Loop builder uses same data-pbfield naming convention scoped by container; re-map:
  if(state.view === 'loopBuilder'){
    app.querySelectorAll('.builder-layout [data-pbfield]').forEach(el=>{
      el.removeEventListener?.('input', ()=>{});
    });
  }
}

function handleBuilderField(el, which){
  const key = which==='pb' ? 'pbfield' : 'lbfield';
  const field = el.getAttribute('data-'+key) || el.getAttribute('data-pbfield');
  const kind = el.getAttribute('data-kind');
  const stateObj = state.view === 'loopBuilder' ? state.lb : state.pb;
  const customObj = state.view === 'loopBuilder' ? state.lbCustom : state.pbCustom;
  if(kind === 'custom'){
    customObj[field] = el.value;
  } else {
    stateObj[field] = el.value;
  }
  updatePreviewOnly();
}
function handleBuilderCheck(el, which){
  const field = el.getAttribute('data-pbcheck');
  const checksObj = state.view === 'loopBuilder' ? state.lbChecks : state.pbChecks;
  checksObj[field] = checksObj[field] || [];
  if(el.checked){ if(!checksObj[field].includes(el.value)) checksObj[field].push(el.value); }
  else { checksObj[field] = checksObj[field].filter(v=>v!==el.value); }
  updatePreviewOnly();
}
function updatePreviewOnly(){
  // Re-render only the relevant view to keep selects from losing custom textarea state on full re-render
  const content = document.getElementById('contentArea');
  if(!content) return;
  if(state.view === 'promptBuilder'){
    content.innerHTML = renderPromptBuilder();
  } else if(state.view === 'loopBuilder'){
    content.innerHTML = renderLoopBuilder();
  }
  bindGlobalEventsScoped();
}
function bindGlobalEventsScoped(){
  // Re-bind only builder-related events after partial re-render
  bindGlobalEvents();
}

/* =========================================================
   KEYBOARD SHORTCUTS
========================================================= */
document.addEventListener('keydown', (e)=>{
  if(document.getElementById('modalOverlay')){
    if(e.key === 'Escape') closeModal();
    return;
  }
  const tag = (e.target.tagName || '').toLowerCase();
  const typing = tag === 'input' || tag === 'textarea' || tag === 'select';
  if(e.key === '/' && !typing){
    e.preventDefault();
    const s = document.getElementById('globalSearch');
    if(s) s.focus();
  } else if((e.key === 'n' || e.key === 'N') && !typing){
    openModal(newWorkflowModalHtml(null));
  }
});

/* =========================================================
   UTIL
========================================================= */
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* =========================================================
   INIT
========================================================= */
render();
</script>
