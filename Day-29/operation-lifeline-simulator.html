<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Lifeline: Supply Chain Crisis Lab</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Welcome Screen */
        .welcome-screen {
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        .welcome-screen h1 {
            font-size: 3.5em;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .welcome-screen p {
            font-size: 1.3em;
            color: #b0b0b0;
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.6;
        }

        .cta-button {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
            border: none;
            padding: 16px 50px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
            margin-top: 20px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 212, 255, 0.5);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        /* Cards */
        .card {
            background: rgba(30, 35, 50, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            margin: 15px 0;
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.1);
        }

        .card h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .card h3 {
            color: #00d4ff;
            font-size: 1.2em;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .metric-label {
            color: #b0b0b0;
            font-weight: 600;
        }

        .metric-value {
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.1em;
        }

        /* Grid Layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            
            .welcome-screen h1 {
                font-size: 2.2em;
            }
        }

        /* Crisis Display */
        .crisis-alert {
            background: linear-gradient(135deg, rgba(255, 100, 80, 0.2), rgba(255, 50, 50, 0.1));
            border: 2px solid #ff6450;
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            animation: pulse 2s infinite;
        }

        .crisis-alert h2 {
            color: #ff6450;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .crisis-alert .urgency {
            display: inline-block;
            background: #ff6450;
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .impact-item {
            background: rgba(255, 100, 80, 0.1);
            border-left: 4px solid #ff6450;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .action-button {
            background: rgba(30, 35, 50, 0.8);
            border: 2px solid rgba(0, 212, 255, 0.3);
            color: #e0e0e0;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 1em;
            position: relative;
            overflow: hidden;
        }

        .action-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 212, 255, 0.1);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .action-button:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
        }

        .action-button:hover:before {
            left: 0;
        }

        .action-button h3 {
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .action-button p {
            font-size: 0.9em;
            color: #b0b0b0;
            margin-bottom: 10px;
        }

        .action-button .impact {
            font-size: 0.85em;
            color: #00d4ff;
            font-weight: 600;
        }

        .action-button.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* Progress Bars */
        .progress-container {
            margin: 20px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* Negotiation */
        .negotiation-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .negotiation-choice {
            background: rgba(30, 35, 50, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .negotiation-choice:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(10px);
        }

        .negotiation-choice h4 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .negotiation-choice p {
            color: #b0b0b0;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .negotiation-outcome {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .outcome-item {
            flex: 1;
            background: rgba(0, 212, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }

        /* Question */
        .question-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .question-text {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 1.1em;
            color: #e0e0e0;
        }

        .option-button {
            background: rgba(30, 35, 50, 0.8);
            border: 2px solid rgba(0, 212, 255, 0.2);
            color: #e0e0e0;
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            margin: 12px 0;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 1em;
            width: 100%;
        }

        .option-button:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
            transform: translateX(5px);
        }

        /* Screen Headers */
        .screen-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease;
        }

        .screen-header h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .screen-header p {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .progress-step {
            text-align: center;
            color: #b0b0b0;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        .progress-step .current {
            color: #00d4ff;
            font-weight: 700;
        }

        /* Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .score-box {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .score-box:hover {
            border-color: #00d4ff;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
        }

        .score-box h3 {
            color: #b0b0b0;
            font-size: 0.95em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-number {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .feedback-section {
            background: rgba(30, 35, 50, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .feedback-section h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .feedback-section p {
            color: #b0b0b0;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 100, 80, 0.7);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(255, 100, 80, 0);
            }
        }

        .replay-button {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
            border: none;
            padding: 14px 40px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
            margin-top: 30px;
        }

        .replay-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 212, 255, 0.5);
        }

        .next-button, .submit-button {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
            margin-top: 20px;
            margin-right: 10px;
        }

        .next-button:hover, .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 212, 255, 0.5);
        }

        .next-button:disabled, .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .secondary-button {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 2px solid #00d4ff;
            padding: 12px 35px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .secondary-button:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .hint {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 0.95em;
            color: #b0b0b0;
        }

        .word-of-day {
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.95em;
        }

        .word-of-day strong {
            color: #00d4ff;
        }

        .word-of-day em {
            color: #b0b0b0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Utility functions
        const generateCompany = () => {
            const industries = ['Electronics', 'Automotive', 'Pharmaceuticals', 'Fashion', 'Food & Beverage'];
            const countries = ['China', 'Vietnam', 'India', 'Mexico', 'Thailand'];
            
            return {
                name: `Global${Math.random().toString(36).substring(7).toUpperCase()}Corp`,
                industry: industries[Math.floor(Math.random() * industries.length)],
                revenue: (Math.floor(Math.random() * 8) + 2) * 100 + 'M',
                factories: Math.floor(Math.random() * 8) + 3,
                warehouses: Math.floor(Math.random() * 12) + 5,
                suppliers: Math.floor(Math.random() * 30) + 15,
                inventoryDays: Math.floor(Math.random() * 40) + 20,
                leadTime: Math.floor(Math.random() * 60) + 30,
                countries: countries.slice(0, Math.floor(Math.random() * 3) + 2)
            };
        };

        const generateCrisis = () => {
            const crises = [
                {
                    name: '🔥 Factory Fire',
                    description: 'A major production facility has been destroyed by fire, halting 35% of manufacturing capacity.',
                    urgency: 'CRITICAL - 24 HOURS',
                    impacts: ['Production down 35%', 'Inventory depletes 40% faster', 'Customer orders delayed 2-3 weeks']
                },
                {
                    name: '📉 Supplier Bankruptcy',
                    description: 'Your largest supplier unexpectedly files bankruptcy, cutting off 25% of raw material supply.',
                    urgency: 'CRITICAL - 48 HOURS',
                    impacts: ['25% supply reduction', 'Alternative suppliers cost 15% more', 'Quality concerns arise']
                },
                {
                    name: '⚓ Port Strike',
                    description: 'Workers at major shipping ports initiate a strike, blocking export of finished goods.',
                    urgency: 'CRITICAL - 72 HOURS',
                    impacts: ['Export delays 2+ weeks', 'Warehouses reach capacity', 'Revenue impact estimated']
                },
                {
                    name: '💻 Cyberattack',
                    description: 'Ransomware infiltrates your supply chain management system, disrupting order processing.',
                    urgency: 'CRITICAL - IMMEDIATE',
                    impacts: ['Order visibility lost', 'Manual processes slow operations 50%', 'Customer trust threatened']
                },
                {
                    name: '🌊 Regional Flood',
                    description: 'Severe flooding devastates warehouse and supplier regions, destroying inventory and facilities.',
                    urgency: 'CRITICAL - 48 HOURS',
                    impacts: ['20% inventory lost', '3-4 suppliers offline', 'Transportation routes impassable']
                },
                {
                    name: '⚡ Raw Material Shortage',
                    description: 'Global shortage of critical raw material due to geopolitical tensions and export restrictions.',
                    urgency: 'CRITICAL - ONGOING',
                    impacts: ['Material costs up 30%', 'Production capacity reduced 40%', 'Lead times extended']
                },
                {
                    name: '🌍 Political Conflict',
                    description: 'Trade war escalates, imposing 40% tariffs on imports from key manufacturing regions.',
                    urgency: 'CRITICAL - 1 WEEK',
                    impacts: ['Costs increase dramatically', 'Supply chain reconfiguration needed', 'Market share at risk']
                },
                {
                    name: '🚢 Shipping Delay',
                    description: 'Global shipping crisis causes 50% of container ships to operate at half capacity.',
                    urgency: 'CRITICAL - ONGOING',
                    impacts: ['Delivery delays 30-45 days', 'Freight costs triple', 'Inventory builds up']
                }
            ];
            return crises[Math.floor(Math.random() * crises.length)];
        };

        const warRoomActions = [
            {
                id: 1,
                name: 'Activate Emergency Suppliers',
                description: 'Contact pre-vetted backup suppliers to ramp up production.',
                impact: 'Cost +20%, Inventory +15%, Speed +10%',
                effects: { cost: -20, inventory: 15, speed: 10 }
            },
            {
                id: 2,
                name: 'Rush Air Freight',
                description: 'Ship priority orders via air to maintain customer delivery dates.',
                impact: 'Cost +35%, Speed +25%, Satisfaction +20%',
                effects: { cost: -35, speed: 25, satisfaction: 20 }
            },
            {
                id: 3,
                name: 'Negotiate with Top Customers',
                description: 'Request short-term delivery delays for non-critical orders.',
                impact: 'Speed +15%, Satisfaction -10%, Profit +10%',
                effects: { speed: 15, satisfaction: -10, profit: 10 }
            },
            {
                id: 4,
                name: 'Reduce Non-Essential Production',
                description: 'Focus manufacturing on high-margin products only.',
                impact: 'Profit +15%, Inventory +5%, Satisfaction -5%',
                effects: { profit: 15, inventory: 5, satisfaction: -5 }
            },
            {
                id: 5,
                name: 'Implement Temporary Automation',
                description: 'Deploy AI and robotics to accelerate production.',
                impact: 'Cost +25%, Speed +20%, Inventory +10%',
                effects: { cost: -25, speed: 20, inventory: 10 }
            },
            {
                id: 6,
                name: 'Strategic Price Increase',
                description: 'Raise prices on less price-sensitive product lines.',
                impact: 'Profit +20%, Satisfaction -15%, Inventory +5%',
                effects: { profit: 20, satisfaction: -15, inventory: 5 }
            }
        ];

        const boardroomQuestions = [
            {
                question: 'A supplier requests a 20% price increase due to crisis costs. You can afford 10% more. How do you respond?',
                options: [
                    { text: 'Accept the full 20% - relationship stability is critical now', score: 7 },
                    { text: 'Offer 10% and start vetting alternative suppliers', score: 9 },
                    { text: 'Refuse and threaten to switch suppliers entirely', score: 3 },
                    { text: 'Negotiate to 15% with longer contract commitment', score: 8 }
                ]
            },
            {
                question: 'Your team reports employee burnout from crisis management. What\'s your priority?',
                options: [
                    { text: 'Push harder - we\'re in crisis mode', score: 2 },
                    { text: 'Implement rotating shifts and mental health support', score: 9 },
                    { text: 'Offer bonuses for overtime work', score: 5 },
                    { text: 'Hire temporary staff to distribute workload', score: 8 }
                ]
            },
            {
                question: 'A major customer threatens to leave due to delivery delays. You can rush their order but lose 30% margin. What do you do?',
                options: [
                    { text: 'Let them leave - can\'t sacrifice profitability', score: 3 },
                    { text: 'Rush the order to preserve the relationship', score: 8 },
                    { text: 'Offer partial rush with 50% discount', score: 7 },
                    { text: 'Suggest they work with a competitor temporarily', score: 2 }
                ]
            },
            {
                question: 'You discover a smaller competitor benefited from your crisis. What\'s your strategic move?',
                options: [
                    { text: 'Focus on recovery; retaliate later', score: 9 },
                    { text: 'Immediately launch aggressive marketing campaign', score: 5 },
                    { text: 'Acquire them or their capabilities', score: 7 },
                    { text: 'Ignore and hope they fail on their own', score: 2 }
                ]
            },
            {
                question: 'A new technology could prevent future crises but requires $5M investment now. Decision?',
                options: [
                    { text: 'Invest immediately - crisis prevention is worth it', score: 9 },
                    { text: 'Wait until cash flow stabilizes', score: 5 },
                    { text: 'Partner with tech vendor to share costs', score: 8 },
                    { text: 'Decline - profit focus is paramount', score: 2 }
                ]
            }
        ];

        const aiInvestments = [
            {
                name: 'Demand Forecasting AI',
                description: 'Predict customer demand 3-6 months ahead with 92% accuracy.',
                impact: 'Inventory -15%, Satisfaction +12%, Profit +8%'
            },
            {
                name: 'Inventory Optimization',
                description: 'Automatically balance safety stock with working capital efficiency.',
                impact: 'Inventory -20%, Cost +3%, Profit +10%'
            },
            {
                name: 'Supplier Risk Monitoring',
                description: 'Monitor suppliers\' financial, geopolitical, and operational health in real-time.',
                impact: 'Cost -5%, Speed +8%, Resilience +15%'
            },
            {
                name: 'Warehouse Vision System',
                description: 'Computer vision automates inventory tracking and quality checks.',
                impact: 'Inventory -10%, Cost +4%, Speed +10%'
            },
            {
                name: 'Procurement Copilot',
                description: 'AI agent negotiates contracts and identifies cost-saving opportunities.',
                impact: 'Cost -12%, Satisfaction +5%, Profit +12%'
            }
        ];

        // Main App Component
        function App() {
            const [screen, setScreen] = useState('welcome');
            const [company, setCompany] = useState(null);
            const [crisis, setCrisis] = useState(null);
            const [metrics, setMetrics] = useState({
                cost: 50,
                inventory: 50,
                profit: 50,
                speed: 50,
                satisfaction: 50
            });
            const [selectedActions, setSelectedActions] = useState([]);
            const [negotiationRound, setNegotiationRound] = useState(0);
            const [negotiationScores, setNegotiationScores] = useState({ trust: 50, price: 50, leadTime: 50 });
            const [questionIndex, setQuestionIndex] = useState(0);
            const [executiveScore, setExecutiveScore] = useState(0);
            const [selectedAI, setSelectedAI] = useState([]);
            const [finalScores, setFinalScores] = useState(null);

            const startGame = () => {
                const newCompany = generateCompany();
                const newCrisis = generateCrisis();
                setCompany(newCompany);
                setCrisis(newCrisis);
                setMetrics({ cost: 50, inventory: 50, profit: 50, speed: 50, satisfaction: 50 });
                setSelectedActions([]);
                setNegotiationRound(0);
                setNegotiationScores({ trust: 50, price: 50, leadTime: 50 });
                setQuestionIndex(0);
                setExecutiveScore(0);
                setSelectedAI([]);
                setFinalScores(null);
                setScreen('company');
            };

            const goToWarRoom = () => {
                setScreen('warRoom');
            };

            const toggleAction = (actionId) => {
                let updated = selectedActions.includes(actionId)
                    ? selectedActions.filter(id => id !== actionId)
                    : [...selectedActions, actionId];
                
                if (updated.length > 3) {
                    updated = updated.slice(1);
                }
                setSelectedActions(updated);
            };

            const simulateActions = () => {
                let newMetrics = { ...metrics };
                selectedActions.forEach(actionId => {
                    const action = warRoomActions.find(a => a.id === actionId);
                    Object.keys(action.effects).forEach(key => {
                        newMetrics[key] = Math.max(0, Math.min(100, newMetrics[key] + action.effects[key]));
                    });
                });
                setMetrics(newMetrics);
                setScreen('negotiation');
            };

            const handleNegotiationChoice = (effects) => {
                let newScores = { ...negotiationScores };
                Object.keys(effects).forEach(key => {
                    newScores[key] = Math.max(0, Math.min(100, newScores[key] + effects[key]));
                });
                setNegotiationScores(newScores);

                if (negotiationRound < 3) {
                    setNegotiationRound(negotiationRound + 1);
                } else {
                    setScreen('boardroom');
                }
            };

            const handleQuestionAnswer = (score) => {
                setExecutiveScore(executiveScore + score);
                if (questionIndex < boardroomQuestions.length - 1) {
                    setQuestionIndex(questionIndex + 1);
                } else {
                    setScreen('aiStrategy');
                }
            };

            const toggleAIInvestment = (index) => {
                let updated = selectedAI.includes(index)
                    ? selectedAI.filter(i => i !== index)
                    : [...selectedAI, index];
                
                if (updated.length > 2) {
                    updated = updated.slice(1);
                }
                setSelectedAI(updated);
            };

            const finalizeDashboard = () => {
                const negotiationScore = Math.round((negotiationScores.trust + negotiationScores.price + negotiationScores.leadTime) / 3);
                const leadership = Math.round((executiveScore / 45) * 100);
                const resilience = Math.round((metrics.speed + metrics.inventory) / 2);
                const costControl = Math.round(100 - Math.abs(metrics.cost - 50));
                const overallScore = Math.round((metrics.profit + resilience + costControl + leadership + negotiationScore) / 5);

                setFinalScores({
                    overall: Math.min(100, overallScore),
                    leadership,
                    negotiation: negotiationScore,
                    resilience,
                    costControl,
                    riskManagement: Math.round((negotiationScores.trust + metrics.speed) / 2),
                    customerSatisfaction: metrics.satisfaction
                });
                setScreen('dashboard');
            };

            return (
                <div className="container">
                    {screen === 'welcome' && <WelcomeScreen onStart={startGame} />}
                    {screen === 'company' && <CompanyScreen company={company} crisis={crisis} onContinue={goToWarRoom} />}
                    {screen === 'warRoom' && (
                        <WarRoomScreen
                            selectedActions={selectedActions}
                            onToggle={toggleAction}
                            onSubmit={simulateActions}
                        />
                    )}
                    {screen === 'negotiation' && (
                        <NegotiationScreen
                            round={negotiationRound}
                            onChoice={handleNegotiationChoice}
                            scores={negotiationScores}
                        />
                    )}
                    {screen === 'boardroom' && (
                        <BoardroomScreen
                            questionIndex={questionIndex}
                            question={boardroomQuestions[questionIndex]}
                            onAnswer={handleQuestionAnswer}
                            progress={`${questionIndex + 1}/${boardroomQuestions.length}`}
                        />
                    )}
                    {screen === 'aiStrategy' && (
                        <AIStrategyScreen
                            selectedAI={selectedAI}
                            onToggle={toggleAIInvestment}
                            onSubmit={finalizeDashboard}
                        />
                    )}
                    {screen === 'dashboard' && <DashboardScreen scores={finalScores} onReplay={startGame} />}
                </div>
            );
        }

        // Welcome Screen Component
        function WelcomeScreen({ onStart }) {
            return (
                <div className="welcome-screen">
                    <h1>⚡ Operation Lifeline</h1>
                    <p>Supply Chain Crisis Lab</p>
                    <p style={{ fontSize: '1.1em', marginTop: '30px' }}>
                        You're the supply chain director. A crisis strikes. Make critical decisions under pressure.
                        Navigate 4 intense challenges in 5 minutes. Ready?
                    </p>
                    <button className="cta-button" onClick={onStart}>
                        Start Simulation
                    </button>
                </div>
            );
        }

        // Company Screen Component
        function CompanyScreen({ company, crisis, onContinue }) {
            return (
                <div>
                    <div className="screen-header">
                        <h1>Your Company</h1>
                        <p>This is the organization you're leading today</p>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <h2>{company.name}</h2>
                            <div className="metric">
                                <span className="metric-label">Industry</span>
                                <span className="metric-value">{company.industry}</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Revenue</span>
                                <span className="metric-value">${company.revenue}</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Factories</span>
                                <span className="metric-value">{company.factories}</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Warehouses</span>
                                <span className="metric-value">{company.warehouses}</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Active Suppliers</span>
                                <span className="metric-value">{company.suppliers}</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Inventory Days</span>
                                <span className="metric-value">{company.inventoryDays}</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Avg Lead Time</span>
                                <span className="metric-value">{company.leadTime} days</span>
                            </div>
                            <div className="metric">
                                <span className="metric-label">Key Markets</span>
                                <span className="metric-value">{company.countries.join(', ')}</span>
                            </div>
                        </div>

                        <div>
                            <div className="crisis-alert">
                                <h2>{crisis.name}</h2>
                                <p style={{ marginTop: '10px', marginBottom: '15px', lineHeight: '1.6' }}>{crisis.description}</p>
                                <div className="urgency">{crisis.urgency}</div>
                                <h3 style={{ marginTop: '20px', marginBottom: '10px', color: '#ff6450' }}>Business Impact:</h3>
                                {crisis.impacts.map((impact, idx) => (
                                    <div key={idx} className="impact-item">{impact}</div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div style={{ textAlign: 'center', marginTop: '40px' }}>
                        <button className="cta-button" onClick={onContinue}>
                            Enter War Room
                        </button>
                    </div>
                </div>
            );
        }

        // War Room Screen Component
        function WarRoomScreen({ selectedActions, onToggle, onSubmit }) {
            return (
                <div>
                    <div className="screen-header">
                        <h1>🛡️ War Room</h1>
                        <p>Choose 3 response actions. Each affects different metrics.</p>
                        <div className="progress-step">Selected: <span className="current">{selectedActions.length}</span>/3</div>
                    </div>

                    <div className="hint">
                        <strong>Why this matters:</strong> Each action has trade-offs. Cost more money, gain speed? Sacrifice profit for customer satisfaction? Choose wisely.
                    </div>

                    <div className="action-grid">
                        {warRoomActions.map(action => (
                            <div
                                key={action.id}
                                className={`action-button ${selectedActions.includes(action.id) ? 'selected' : ''}`}
                                onClick={() => onToggle(action.id)}
                            >
                                <h3>{action.name}</h3>
                                <p>{action.description}</p>
                                <div className="impact">{action.impact}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ textAlign: 'center', marginTop: '40px' }}>
                        <button
                            className="cta-button"
                            onClick={onSubmit}
                            disabled={selectedActions.length !== 3}
                        >
                            Simulate Impact
                        </button>
                    </div>
                </div>
            );
        }

        // Negotiation Screen Component
        function NegotiationScreen({ round, onChoice, scores }) {
            const negotiationScripts = [
                {
                    title: 'Round 1: Initial Contact',
                    scenario: 'Your primary supplier is asking for terms given the crisis. How do you frame the conversation?',
                    choices: [
                        { text: 'Be transparent: "We\'re both stressed. Let\'s find a win-win."', effects: { trust: 10, leadTime: 2 } },
                        { text: 'Be assertive: "We need favorable terms or we switch suppliers."', effects: { trust: -8, price: -5 } },
                        { text: 'Empathize: "Your costs are up too. Let\'s share the burden fairly."', effects: { trust: 15, price: 5 } },
                        { text: 'Negotiate hard: "I can pay 5% more max. Take it or leave it."', effects: { trust: 0, price: -10 } }
                    ]
                },
                {
                    title: 'Round 2: Volume Commitment',
                    scenario: 'Supplier asks: "Will you commit to higher volumes post-crisis to stabilize our business?"',
                    choices: [
                        { text: 'Commit fully: "Yes, we\'ll increase orders 30% for 12 months."', effects: { trust: 15, leadTime: 5 } },
                        { text: 'Hedge: "We\'ll increase 10%, but only if prices stay stable."', effects: { trust: 5, price: 3 } },
                        { text: 'Defer: "Let\'s revisit after the crisis. Too uncertain now."', effects: { trust: -5, leadTime: -3 } },
                        { text: 'Counter-offer: "We\'ll commit 20% if you reduce prices 8%."', effects: { trust: 8, price: -12 } }
                    ]
                },
                {
                    title: 'Round 3: Payment Terms',
                    scenario: 'Supplier needs faster cash flow: "Can you move from net-30 to net-15 payments?"',
                    choices: [
                        { text: 'Agree: "We\'ll pay in 15 days to help you out."', effects: { trust: 12, price: -3 } },
                        { text: 'Suggest middle ground: "Let\'s do net-20 instead."', effects: { trust: 8, price: -1 } },
                        { text: 'Propose alternative: "We\'ll pay full price net-30, not net-15."', effects: { trust: 2, price: 5 } },
                        { text: 'Decline: "Net-30 is our policy. Non-negotiable."', effects: { trust: -10, leadTime: -5 } }
                    ]
                },
                {
                    title: 'Round 4: Long-term Partnership',
                    scenario: 'Final ask: "Let\'s lock in a 3-year contract with price protection and joint innovation plans."',
                    choices: [
                        { text: 'Full agreement: "Yes, let\'s build this long-term."', effects: { trust: 20, price: 8, leadTime: 10 } },
                        { text: 'Partial commitment: "2-year contract, revisit annually."', effects: { trust: 12, price: 5, leadTime: 5 } },
                        { text: 'Strategic hedge: "1-year contract with performance clauses."', effects: { trust: 5, price: 2, leadTime: 0 } },
                        { text: 'Cautious approach: "Year-to-year only for now."', effects: { trust: -2, price: -5, leadTime: -3 } }
                    ]
                }
            ];

            const currentScript = negotiationScripts[round];

            return (
                <div className="negotiation-container">
                    <div className="screen-header">
                        <h1>🤝 Supplier Negotiation</h1>
                        <div className="progress-step">
                            Round <span className="current">{round + 1}</span>/4
                        </div>
                    </div>

                    <div className="card">
                        <h2>{currentScript.title}</h2>
                        <p style={{ fontSize: '1.1em', color: '#e0e0e0', marginTop: '15px', lineHeight: '1.6' }}>
                            {currentScript.scenario}
                        </p>
                    </div>

                    <div style={{ marginTop: '25px', marginBottom: '25px' }}>
                        <h3 style={{ color: '#00d4ff', marginBottom: '15px' }}>Negotiation Position</h3>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '15px' }}>
                            <div style={{ background: 'rgba(0, 212, 255, 0.1)', padding: '15px', borderRadius: '10px', textAlign: 'center' }}>
                                <div style={{ color: '#b0b0b0', fontSize: '0.9em' }}>Trust Level</div>
                                <div style={{ fontSize: '1.8em', color: '#00d4ff', fontWeight: '700', marginTop: '8px' }}>{scores.trust}</div>
                            </div>
                            <div style={{ background: 'rgba(0, 212, 255, 0.1)', padding: '15px', borderRadius: '10px', textAlign: 'center' }}>
                                <div style={{ color: '#b0b0b0', fontSize: '0.9em' }}>Price Index</div>
                                <div style={{ fontSize: '1.8em', color: '#00d4ff', fontWeight: '700', marginTop: '8px' }}>{scores.price}</div>
                            </div>
                            <div style={{ background: 'rgba(0, 212, 255, 0.1)', padding: '15px', borderRadius: '10px', textAlign: 'center' }}>
                                <div style={{ color: '#b0b0b0', fontSize: '0.9em' }}>Lead Time Gain</div>
                                <div style={{ fontSize: '1.8em', color: '#00d4ff', fontWeight: '700', marginTop: '8px' }}>{scores.leadTime}</div>
                            </div>
                        </div>
                    </div>

                    <div className="hint">
                        <strong>Tip:</strong> Balance short-term wins (price) with long-term relationship health (trust). Both matter.
                    </div>

                    <div style={{ marginTop: '25px' }}>
                        {currentScript.choices.map((choice, idx) => (
                            <div
                                key={idx}
                                className="negotiation-choice"
                                onClick={() => onChoice(choice.effects)}
                            >
                                <h4>Option {idx + 1}</h4>
                                <p>{choice.text}</p>
                                <div className="negotiation-outcome">
                                    {Object.keys(choice.effects).map(key => (
                                        <div key={key} className="outcome-item">
                                            {key === 'trust' ? '🤝' : key === 'price' ? '💰' : '⏱️'} {key}: {choice.effects[key] > 0 ? '+' : ''}{choice.effects[key]}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Boardroom Screen Component
        function BoardroomScreen({ questionIndex, question, onAnswer, progress }) {
            return (
                <div className="question-container">
                    <div className="screen-header">
                        <h1>👔 CEO Boardroom</h1>
                        <p>Demonstrate executive decision-making</p>
                        <div className="progress-step">
                            Question <span className="current">{progress}</span>
                        </div>
                    </div>

                    <div className="question-text">
                        {question.question}
                    </div>

                    <div>
                        {question.options.map((option, idx) => (
                            <button
                                key={idx}
                                className="option-button"
                                onClick={() => onAnswer(option.score)}
                            >
                                {option.text}
                                <div style={{ fontSize: '0.85em', color: '#00d4ff', marginTop: '8px', fontWeight: '600' }}>
                                    Leadership Score: +{option.score}
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // AI Strategy Screen Component
        function AIStrategyScreen({ selectedAI, onToggle, onSubmit }) {
            return (
                <div>
                    <div className="screen-header">
                        <h1>🤖 AI Resilience Strategy</h1>
                        <p>Invest in two AI systems to prevent future crises</p>
                        <div className="progress-step">Selected: <span className="current">{selectedAI.length}</span>/2</div>
                    </div>

                    <div className="hint">
                        <strong>Strategic Choice:</strong> These investments shape your company's future resilience. Choose based on your biggest vulnerabilities from this crisis.
                    </div>

                    <div className="grid-3">
                        {aiInvestments.map((investment, idx) => (
                            <div
                                key={idx}
                                className={`card ${selectedAI.includes(idx) ? 'selected' : ''}`}
                                style={{
                                    cursor: 'pointer',
                                    border: selectedAI.includes(idx) ? '2px solid #00d4ff' : '1px solid rgba(0, 212, 255, 0.2)',
                                    boxShadow: selectedAI.includes(idx) ? '0 0 20px rgba(0, 212, 255, 0.3)' : 'none'
                                }}
                                onClick={() => onToggle(idx)}
                            >
                                <h2 style={{ fontSize: '1.4em' }}>{investment.name}</h2>
                                <p style={{ color: '#b0b0b0', marginTop: '10px', lineHeight: '1.6' }}>{investment.description}</p>
                                <div style={{ marginTop: '15px', padding: '12px', background: 'rgba(0, 212, 255, 0.1)', borderRadius: '8px', fontSize: '0.95em' }}>
                                    <strong>Expected Impact:</strong> {investment.impact}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div style={{ textAlign: 'center', marginTop: '40px' }}>
                        <button
                            className="cta-button"
                            onClick={onSubmit}
                            disabled={selectedAI.length !== 2}
                        >
                            View Final Report
                        </button>
                    </div>
                </div>
            );
        }

        // Dashboard Screen Component
        function DashboardScreen({ scores, onReplay }) {
            const getPerformanceLevel = (score) => {
                if (score >= 80) return 'Exceptional';
                if (score >= 65) return 'Strong';
                if (score >= 50) return 'Adequate';
                if (score >= 35) return 'Concerning';
                return 'Critical';
            };

            const getRecommendation = (overall) => {
                if (overall >= 85) {
                    return 'You demonstrated master-level crisis management. Your balanced approach, stakeholder focus, and strategic foresight set a new standard. Consider leadership roles in industry resilience initiatives.';
                } else if (overall >= 70) {
                    return 'Strong crisis response with good decision-making. Focus on building deeper supplier relationships and AI-driven predictive capabilities to elevate performance.';
                } else if (overall >= 55) {
                    return 'You navigated the crisis but left value on the table. Revisit: customer relationship prioritization, supplier partnership depth, and cost vs. resilience trade-offs.';
                } else {
                    return 'This crisis exposed vulnerabilities in your supply chain network. Priority: diversify suppliers, invest heavily in AI visibility, and build strategic reserve capacity.';
                }
            };

            return (
                <div>
                    <div className="screen-header">
                        <h1>📊 Crisis Resolution Report</h1>
                        <p>Your comprehensive performance analysis</p>
                    </div>

                    <div className="word-of-day">
                        <strong>Word of the Day:</strong> <em>Perspicacity</em> - The quality of having keen insight or understanding; being perceptive and discerning. (e.g., "Your perspicacity in supplier negotiations earned trust when it mattered most.")
                    </div>

                    <div className="dashboard-grid">
                        <div className="score-box">
                            <h3>Overall Crisis Score</h3>
                            <div className="score-number">{scores.overall}</div>
                            <div style={{ marginTop: '10px', fontSize: '0.9em', color: '#b0b0b0' }}>
                                {getPerformanceLevel(scores.overall)}
                            </div>
                        </div>
                        <div className="score-box">
                            <h3>Leadership</h3>
                            <div className="score-number">{scores.leadership}</div>
                        </div>
                        <div className="score-box">
                            <h3>Negotiation</h3>
                            <div className="score-number">{scores.negotiation}</div>
                        </div>
                        <div className="score-box">
                            <h3>Resilience</h3>
                            <div className="score-number">{scores.resilience}</div>
                        </div>
                        <div className="score-box">
                            <h3>Cost Control</h3>
                            <div className="score-number">{scores.costControl}</div>
                        </div>
                        <div className="score-box">
                            <h3>Risk Management</h3>
                            <div className="score-number">{scores.riskManagement}</div>
                        </div>
                        <div className="score-box">
                            <h3>Customer Satisfaction</h3>
                            <div className="score-number">{scores.customerSatisfaction}</div>
                        </div>
                    </div>

                    <div className="feedback-section">
                        <h3>🎯 Executive Recommendation</h3>
                        <p>{getRecommendation(scores.overall)}</p>
                    </div>

                    <div className="feedback-section">
                        <h3>💡 Key Insights</h3>
                        <p><strong>Strengths:</strong> Your {scores.leadership > scores.negotiation ? 'decisive leadership' : 'relationship-building'} was your greatest asset. This foundation enabled recovery.</p>
                        <p style={{ marginTop: '12px' }}><strong>Growth Area:</strong> {scores.costControl < 50 ? 'Financial discipline during crisis mode needs refinement. Balance cost-cutting with long-term viability.' : 'Push for greater operational speed. Real-time decision-making could unlock margin.'}</p>
                    </div>

                    <div className="feedback-section">
                        <h3>📚 Lessons from Simulation</h3>
                        <p>1. <strong>Stakeholder symmetry:</strong> Crises demand treating suppliers, employees, and customers as interdependent partners, not adversaries.</p>
                        <p style={{ marginTop: '10px' }}>2. <strong>Visibility wins:</strong> AI investments in forecasting and supplier monitoring would have detected vulnerabilities 6+ months earlier.</p>
                        <p style={{ marginTop: '10px' }}>3. <strong>Resilience over efficiency:</strong> Companies optimized solely for cost rarely survive crises. Redundancy is strategic.</p>
                    </div>

                    <div style={{ textAlign: 'center', marginTop: '40px' }}>
                        <button className="replay-button" onClick={onReplay}>
                            Run Another Simulation
                        </button>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
