<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Freelancer Edition</title>
<style>
  :root{
    --ink:#12181f;
    --panel:#1c2530;
    --panel2:#232e3b;
    --paper:#f3ecd9;
    --paper-line:#d8cbaa;
    --gold:#c9a961;
    --gold-bright:#e3c583;
    --teal:#4a9b8e;
    --text:#eef0ef;
    --muted:#8a97a6;
    --blue:#7c9cff;
    --amber:#e8a355;
    --rose:#d97786;
    --green:#6fc19a;
    --purple:#b98cd6;
    --cyan:#59b3c9;
    --danger:#d97786;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, #1b2836 0%, transparent 60%),
      radial-gradient(1000px 500px at 110% 10%, #24211a 0%, transparent 55%),
      var(--ink);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  @font-face{font-family:'sys-serif';src:local('Georgia');}
  .display{font-family:Georgia,'Iowan Old Style',serif; letter-spacing:0.01em;}
  .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;}
  #app{max-width:920px;margin:0 auto;padding:28px 20px 60px;}
  .eyebrow{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  h1.brand{font-size:38px;margin:6px 0 2px;font-weight:700;}
  .subtitle{color:var(--muted);font-size:15px;margin-bottom:6px;}
  .card-shadow{box-shadow:0 10px 30px rgba(0,0,0,0.35);}

  /* progress ledger */
  .ledger{display:flex;align-items:center;gap:10px;margin:18px 0 26px;flex-wrap:wrap;}
  .ledger-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .ticks{display:flex;gap:6px;}
  .tick{width:22px;height:8px;border-radius:4px;background:#2a3644;transition:background .4s, transform .3s;}
  .tick.done{background:var(--gold);}
  .tick.active{background:var(--teal); transform:scaleY(1.4);}

  .panel{background:var(--panel);border-radius:18px;padding:26px;border:1px solid #2a3644;}

  /* buttons */
  button{font-family:inherit;cursor:pointer;}
  .btn{
    background:var(--gold);color:#241c0d;border:none;padding:12px 26px;border-radius:10px;
    font-weight:700;font-size:14.5px;letter-spacing:0.02em;transition:transform .15s, box-shadow .15s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(201,169,97,0.35);}
  .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid #37455a;padding:10px 20px;border-radius:10px;font-size:13.5px;}
  .btn-ghost:hover{color:var(--text);border-color:var(--gold);}

  /* role cards (collectible business cards) */
  .role-bank{display:flex;flex-wrap:wrap;gap:12px;margin:18px 0;}
  .role-card{
    width:128px;min-height:96px;border-radius:12px;padding:12px 10px;
    background:linear-gradient(160deg,#212b38,#1a232f);
    border:1.5px solid #33415288; position:relative; overflow:hidden;
    transition:transform .18s ease, border-color .18s, box-shadow .18s;
    user-select:none;
  }
  .role-card::after{
    content:'';position:absolute;top:-60%;left:-20%;width:60%;height:220%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
    transform:rotate(20deg); pointer-events:none;
  }
  .role-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,0.4);}
  .role-card.armed{border-color:var(--gold-bright); box-shadow:0 0 0 2px rgba(227,197,131,0.3);}
  .role-card.selected{border-color:var(--gold-bright); background:linear-gradient(160deg,#2b3040,#1a232f);}
  .role-card .icon{font-size:24px;display:block;margin-bottom:6px;}
  .role-card .name{font-size:12.5px;font-weight:700;line-height:1.25;}
  .role-card .check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#241c0d;font-size:12px;display:none;align-items:center;justify-content:center;font-weight:900;}
  .role-card.selected .check{display:flex;}
  .role-card[data-color]{}

  /* ownership slot */
  .slot-zone{margin:22px 0;}
  .owner-slot{
    border:2px dashed #3a4759;border-radius:14px;min-height:110px;
    display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);font-size:13px;padding:14px;transition:border-color .2s, background .2s;
  }
  .owner-slot.hover{border-color:var(--gold);background:rgba(201,169,97,0.06);}
  .owner-slot.filled{border-style:solid;border-color:var(--gold);}

  /* task ticket card (signature element) */
  .ticket{
    background:var(--paper);color:#2b2416;border-radius:6px;
    padding:22px 22px 22px 30px;position:relative;margin:14px 0 22px;
    box-shadow:0 14px 30px rgba(0,0,0,0.35);
  }
  .ticket::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:14px;
    background-image:radial-gradient(circle at 7px 0, transparent 5px, var(--ink) 5.5px);
    background-size:14px 16px; background-repeat:repeat-y;
  }
  .ticket-num{position:absolute;top:14px;right:18px;font-size:11px;color:#8a7a4f;letter-spacing:0.05em;}
  .ticket-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;color:#9a8552;font-weight:700;margin-bottom:8px;}
  .ticket-text{font-size:17px;line-height:1.5;font-weight:600;font-family:Georgia,serif;}

  /* stamp */
  .stamp{
    display:inline-block;border:3px solid var(--gold-bright);color:var(--gold-bright);
    padding:6px 14px;border-radius:8px;font-weight:800;letter-spacing:0.08em;font-size:13px;
    transform:rotate(-7deg) scale(0.8);opacity:0;text-transform:uppercase;
    animation:stampIn .35s ease forwards;
  }
  @keyframes stampIn{to{transform:rotate(-7deg) scale(1);opacity:1;}}

  .reveal{background:var(--panel2);border-radius:14px;padding:18px 20px;margin-top:14px;border:1px solid #2f3c4d;animation:fadeUp .35s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .reveal h4{margin:0 0 6px;font-size:14px;color:var(--gold-bright);}
  .reveal p{margin:4px 0;font-size:14px;color:#d7dde3;line-height:1.5;}
  .assist-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .pill{background:#2a3644;padding:4px 10px;border-radius:20px;font-size:12px;color:var(--teal);}

  /* stage2 slots row */
  .slots-row{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;}
  .step-slot{
    width:120px;min-height:76px;border:2px dashed #3a4759;border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--muted);font-size:11px;text-align:center;padding:6px;position:relative;transition:.2s;
  }
  .step-slot .step-num{position:absolute;top:-10px;left:8px;background:var(--ink);color:var(--gold);font-size:10px;padding:0 5px;font-weight:700;}
  .step-slot.hover{border-color:var(--teal);background:rgba(74,155,142,0.08);}
  .step-slot.filled{border-style:solid;border-color:var(--teal);}
  .arrow{align-self:center;color:var(--muted);font-size:18px;}

  /* stage3 selection */
  .hint{color:var(--muted);font-size:13px;margin:6px 0 14px;}
  .counter{font-size:13px;color:var(--gold-bright);font-weight:700;margin-bottom:10px;}

  .actions{display:flex;gap:12px;margin-top:20px;align-items:center;flex-wrap:wrap;}

  /* intro */
  .stage-overview{display:flex;gap:14px;margin:22px 0;flex-wrap:wrap;}
  .stage-chip{flex:1;min-width:160px;background:var(--panel2);border-radius:12px;padding:16px;border:1px solid #2f3c4d;}
  .stage-chip .num{color:var(--gold);font-weight:800;font-size:12px;letter-spacing:0.08em;}
  .stage-chip h3{margin:6px 0 4px;font-size:16px;}
  .stage-chip p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.4;}

  /* results */
  .bars{margin:24px 0;}
  .bar-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .bar-label{width:150px;font-size:13px;color:var(--text);flex-shrink:0;}
  .bar-track{flex:1;height:16px;background:#232e3b;border-radius:8px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:8px;width:0%;transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
  .bar-val{width:48px;text-align:right;font-size:13px;color:var(--gold-bright);font-family:monospace;}

  .reflect-block{margin-bottom:16px;}
  .reflect-block .tag{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--teal);font-weight:700;margin-bottom:4px;}
  .reflect-block p{margin:0;font-size:14.5px;line-height:1.55;color:#dfe4e9;}

  .confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50;}
  .confetti{position:absolute;top:-10px;width:8px;height:14px;opacity:0.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0;}}

  @media(max-width:600px){
    h1.brand{font-size:28px;}
    .role-card{width:104px;}
    .step-slot{width:96px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- DATA ---------------- */
const ROLES = {
  owner:  {name:"You (Freelancer)", icon:"🧑‍💻", color:"var(--gold)"},
  client: {name:"Client", icon:"🤝", color:"var(--teal)"},
  bookkeeper:{name:"Bookkeeper", icon:"🧾", color:"var(--blue)"},
  va: {name:"Virtual Assistant", icon:"🗂️", color:"var(--amber)"},
  marketing:{name:"Marketing Contractor", icon:"📣", color:"var(--rose)"},
  developer:{name:"Web Developer", icon:"💻", color:"var(--green)"},
  legal:{name:"Legal Advisor", icon:"⚖️", color:"var(--purple)"},
  subcontractor:{name:"Subcontractor", icon:"🛠️", color:"var(--cyan)"}
};
const ROLE_IDS = Object.keys(ROLES);

const STAGE1_POOL = [
 {text:"A client hasn't paid an invoice that's 30 days overdue.", owner:"owner", assist:["bookkeeper"],
  why:"It's your client relationship and your cash flow, so you make the call on how to approach it. Your bookkeeper flags overdue invoices and can draft the reminder."},
 {text:"A client's website is throwing errors after a plugin update.", owner:"developer", assist:["owner"],
  why:"The Web Developer built and maintains the site, so they diagnose and fix it. You stay looped in to update the client on progress."},
 {text:"A new contract needs a liability clause before signing a big client.", owner:"legal", assist:["owner"],
  why:"Contract language is a Legal Advisor's job, not a guess. You still decide what terms you're comfortable agreeing to."},
 {text:"A client wants three social posts scheduled this week.", owner:"marketing", assist:["va"],
  why:"Content strategy is the Marketing Contractor's specialty. A VA can help queue the posts once they're approved."},
 {text:"Your inbox has 40 unread client emails after a week away.", owner:"va", assist:["owner"],
  why:"A Virtual Assistant triages routine messages first. You still handle anything only you can answer."},
 {text:"A subcontractor's deliverable is a week late on a shared project.", owner:"owner", assist:["subcontractor"],
  why:"You're accountable for what reaches the client, so you chase this. The subcontractor owns fixing their own delay."},
 {text:"You need to know if last month was profitable before quoting a new project.", owner:"bookkeeper", assist:["owner"],
  why:"Your bookkeeper tracks the numbers and can pull a quick profitability snapshot. You use it to make the pricing call."},
 {text:"A client asks for a custom feature outside the agreed scope.", owner:"owner", assist:["legal"],
  why:"Scope conversations with the client are yours to have. Legal can confirm what the contract already covers."},
 {text:"Your website needs a new booking form built for clients.", owner:"developer", assist:["va"],
  why:"Building the form is technical work for the Developer. A VA can test it from a client's point of view before launch."}
];

const STAGE2_POOL = [
 {text:"A client emails asking for a scope change mid-project.",
  steps:["client","owner","legal","client","owner"],
  why:"Scope changes get checked against the contract before anyone commits, then confirmed with the client before new work starts."},
 {text:"A subcontractor delivers work that doesn't meet the brief.",
  steps:["owner","subcontractor","owner","client"],
  why:"You catch the issue, send it back to the subcontractor to fix, review the correction yourself, and only then deliver to the client."},
 {text:"A completed milestone needs to be invoiced.",
  steps:["owner","bookkeeper","client"],
  why:"You confirm the milestone is genuinely done, your bookkeeper generates the invoice, and it goes out to the client."},
 {text:"A client reports an urgent bug on their site.",
  steps:["client","owner","developer","client"],
  why:"The client reports it, you triage and assign it, the developer fixes it, and you confirm the fix back to the client."},
 {text:"You're launching a new service and want to announce it.",
  steps:["owner","marketing","va","client"],
  why:"You decide the offer, marketing shapes the announcement, a VA schedules it out, and existing clients hear it first."},
 {text:"A client wants to renew their contract for another year.",
  steps:["client","legal","owner","client"],
  why:"The client signals interest, legal updates the terms, you review and approve, then it goes back for signature."}
];

const STAGE3_POOL = [
 {text:"A long-time client suddenly stops responding, and an invoice is overdue.",
  primary:"owner", supporting:["bookkeeper","legal","va"],
  flow:"Bookkeeper flags the overdue amount → VA tries a friendly check-in → you make the personal call → Legal is looped in only if it stays unresolved."},
 {text:"You land three new clients in one week and can't keep up.",
  primary:"owner", supporting:["subcontractor","va","developer"],
  flow:"You triage priorities → VA handles scheduling and admin → a subcontractor absorbs overflow work → the developer clears any technical backlog."},
 {text:"A negative review appears online criticizing your responsiveness.",
  primary:"owner", supporting:["marketing","va","legal"],
  flow:"Marketing monitors the review and advises on tone → VA drafts a calm public response → you approve and post it → Legal reviews only if it verges on defamatory."},
 {text:"A major project deadline is at risk due to scope creep.",
  primary:"owner", supporting:["client","legal","subcontractor"],
  flow:"You flag the risk early → Legal checks what the contract covers → the client hears what's realistic → a subcontractor helps close the gap if needed."},
 {text:"Sales increase dramatically after a social post goes viral.",
  primary:"owner", supporting:["marketing","va","bookkeeper"],
  flow:"Marketing capitalizes on the momentum → VA manages the surge in inquiries → bookkeeper watches cash flow and capacity → you decide how much new work to accept."}
];

/* ---------------- STATE ---------------- */
let state = {
  screen:"intro",
  round:0, // 0,1,2 within a stage
  stage:1,
  s1:[], s2:[], s3:[],
  s1picks:[], s2picks:[], s3picks:[],
  scores:{ownership:0, workflow:0, collaboration:0, delegation:0},
  overAssignCount:0, underCollabCount:0,
  armedRole:null,
  currentSlots:[], // for stage2 in-progress
  currentSelect:[] // for stage3 in-progress
};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(arr,n){return shuffle(arr).slice(0,n);}
function ticketNum(){return "#"+Math.floor(1000+Math.random()*8999);}
function beep(freq=440,dur=0.08){
  try{
    const ctx = window.__ac || (window.__ac = new (window.AudioContext||window.webkitAudioContext)());
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=freq; o.type="sine";
    g.gain.setValueAtTime(0.06,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+dur);
  }catch(e){}
}

const app = document.getElementById("app");

/* ---------------- RENDER HELPERS ---------------- */
function ledger(){
  const totalSteps=9;
  const doneSteps = (state.stage-1)*3 + state.round;
  let ticks="";
  for(let i=0;i<totalSteps;i++){
    let cls="tick";
    if(i<doneSteps) cls+=" done";
    else if(i===doneSteps && state.screen!=="intro" && state.screen!=="results") cls+=" active";
    ticks+=`<div class="${cls}"></div>`;
  }
  const stageNames={1:"Who Owns This?",2:"Task Routing",3:"Collaboration Challenge"};
  return `<div class="ledger">
    <span class="ledger-label">Stage ${state.stage} · ${stageNames[state.stage]||""} — Round ${state.round+1} of 3</span>
    <div class="ticks">${ticks}</div>
  </div>`;
}

function roleCardHTML(id, opts={}){
  const r = ROLES[id];
  const cls = ["role-card"];
  if(opts.armed) cls.push("armed");
  if(opts.selected) cls.push("selected");
  return `<div class="${cls.join(' ')}" draggable="true" data-role="${id}" ondragstart="onDragStart(event)" onclick="onRoleClick('${id}')">
    <span class="icon">${r.icon}</span>
    <span class="name" style="color:${r.color}">${r.name}</span>
    <div class="check">✓</div>
  </div>`;
}

/* ---------------- INTRO ---------------- */
function renderIntro(){
  app.innerHTML = `
    <div class="eyebrow">Freelancer / Small Business Edition</div>
    <h1 class="brand display">Task Compass</h1>
    <div class="subtitle">Learn how work flows through real organizations.</div>
    <div class="panel">
      <p style="color:#dfe4e9;line-height:1.6;font-size:15px;margin-top:0;">
        You run a one-person shop that's starting to look like a small team: a bookkeeper here, a subcontractor there.
        Nine scenarios test how well you understand who owns what, how work should move, and when a problem needs more than one pair of hands.
      </p>
      <div class="stage-overview">
        <div class="stage-chip"><div class="num">STAGE 1</div><h3>Who Owns This?</h3><p>Pick the right single owner for a task, and see who assists.</p></div>
        <div class="stage-chip"><div class="num">STAGE 2</div><h3>Task Routing</h3><p>Build the order work should travel through your business.</p></div>
        <div class="stage-chip"><div class="num">STAGE 3</div><h3>Collaboration Challenge</h3><p>Assemble a small team for bigger, messier situations.</p></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="startGame()">Open the shop →</button>
      </div>
    </div>
  `;
}

function startGame(){
  state.s1 = pick(STAGE1_POOL,3);
  state.s2 = pick(STAGE2_POOL,3);
  state.s3 = pick(STAGE3_POOL,3);
  state.stage=1; state.round=0; state.screen="s1";
  renderStage1();
}

/* ---------------- STAGE 1 ---------------- */
function renderStage1(){
  const item = state.s1[state.round];
  state.armedRole=null;
  state._selected1=null;
  app.innerHTML = `
    ${ledger()}
    <div class="ticket">
      <div class="ticket-num mono">${ticketNum()}</div>
      <div class="ticket-label">Incoming Task</div>
      <div class="ticket-text">${item.text}</div>
    </div>
    <div class="hint">Tap a role card, then tap the ownership slot — or drag it straight in.</div>
    <div class="role-bank" id="bank">
      ${ROLE_IDS.map(id=>roleCardHTML(id)).join("")}
    </div>
    <div class="slot-zone">
      <div class="owner-slot" id="ownerSlot" ondragover="onSlotDragOver(event)" ondrop="onSlotDrop(event)" ondragleave="onSlotLeave(event)" onclick="onSlotClick()">
        Drop the primary owner here
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="submitBtn" disabled onclick="submitStage1()">Confirm owner</button>
    </div>
    <div id="revealZone"></div>
  `;
}

function onDragStart(ev){
  ev.dataTransfer.setData("text/plain", ev.target.closest(".role-card").dataset.role);
}
function onSlotDragOver(ev){ev.preventDefault(); ev.currentTarget.classList.add("hover");}
function onSlotLeave(ev){ev.currentTarget.classList.remove("hover");}
function onSlotDrop(ev){
  ev.preventDefault();
  const roleId = ev.dataTransfer.getData("text/plain");
  ev.currentTarget.classList.remove("hover");
  assignOwner(roleId);
}
function onRoleClick(id){
  if(state.screen==="s1"){
    if(document.getElementById("ownerSlot")){
      assignOwner(id);
    }
  } else if(state.screen==="s2"){
    armStage2Role(id);
  } else if(state.screen==="s3"){
    toggleStage3Role(id);
  }
}
function assignOwner(id){
  state._selected1 = id;
  const slot = document.getElementById("ownerSlot");
  const r = ROLES[id];
  slot.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;"><span style="font-size:22px">${r.icon}</span><span style="font-size:13px;font-weight:700;color:${r.color}">${r.name}</span></div>`;
  slot.classList.add("filled");
  document.getElementById("submitBtn").disabled=false;
  beep(520,0.06);
}
function onSlotClick(){ /* no-op, tap-to-assign handled via role card click */ }

function submitStage1(){
  const item = state.s1[state.round];
  const chosen = state._selected1;
  const correct = chosen === item.owner;
  state.s1picks.push(chosen);
  if(correct) state.scores.ownership++;
  else if(chosen==="owner") state.overAssignCount++;
  beep(correct?660:300, 0.12);

  const assistNames = item.assist.map(a=>ROLES[a].name).join(", ");
  document.getElementById("revealZone").innerHTML = `
    <div class="reveal">
      <div class="stamp">${correct? "Owner Confirmed":"Reassigned"}</div>
      <h4>✓ Primary Owner: ${ROLES[item.owner].name}</h4>
      <p>${item.why}</p>
      <div class="assist-pills"><span class="pill">May assist: ${assistNames}</span></div>
    </div>
    <div class="actions"><button class="btn" onclick="advance('s1')">Next task →</button></div>
  `;
  document.getElementById("submitBtn").disabled=true;
}

/* ---------------- STAGE 2 ---------------- */
function renderStage2(){
  const item = state.s2[state.round];
  const n = item.steps.length;
  state.currentSlots = new Array(n).fill(null);
  state.armedRole=null;
  let slotsHTML="";
  for(let i=0;i<n;i++){
    slotsHTML += `<div class="step-slot" data-idx="${i}" ondragover="onSlotDragOver(event)" ondragleave="onSlotLeave(event)" ondrop="onStep2Drop(event,${i})" onclick="onStep2Click(${i})">
      <span class="step-num">${i+1}</span>Empty
    </div>`;
    if(i<n-1) slotsHTML += `<div class="arrow">→</div>`;
  }
  app.innerHTML = `
    ${ledger()}
    <div class="ticket">
      <div class="ticket-num mono">${ticketNum()}</div>
      <div class="ticket-label">Route This Task (${n} steps)</div>
      <div class="ticket-text">${item.text}</div>
    </div>
    <div class="hint">Tap a role, then tap a step slot in order — or drag it in. Roles can repeat.</div>
    <div class="role-bank" id="bank">${ROLE_IDS.map(id=>roleCardHTML(id)).join("")}</div>
    <div class="slots-row">${slotsHTML}</div>
    <div class="actions">
      <button class="btn-ghost" onclick="clearStage2()">Clear</button>
      <button class="btn" id="submitBtn2" disabled onclick="submitStage2()">Confirm route</button>
    </div>
    <div id="revealZone"></div>
  `;
}
function armStage2Role(id){
  state.armedRole = id;
  document.querySelectorAll("#bank .role-card").forEach(c=>c.classList.toggle("armed", c.dataset.role===id));
}
function fillStep2(idx, roleId){
  state.currentSlots[idx]=roleId;
  const slot = document.querySelector(`.step-slot[data-idx="${idx}"]`);
  const r = ROLES[roleId];
  slot.innerHTML = `<span class="step-num">${idx+1}</span><span style="font-size:18px">${r.icon}</span><span style="font-size:10.5px;font-weight:700;color:${r.color}">${r.name}</span>`;
  slot.classList.add("filled");
  const allFilled = state.currentSlots.every(s=>s!==null);
  document.getElementById("submitBtn2").disabled = !allFilled;
  beep(520,0.05);
}
function onStep2Drop(ev, idx){
  ev.preventDefault();
  ev.currentTarget.classList.remove("hover");
  const roleId = ev.dataTransfer.getData("text/plain");
  fillStep2(idx, roleId);
}
function onStep2Click(idx){
  if(state.armedRole){
    fillStep2(idx, state.armedRole);
  }
}
function clearStage2(){ renderStage2(); }

function submitStage2(){
  const item = state.s2[state.round];
  const chosen = [...state.currentSlots];
  state.s2picks.push(chosen);
  let points=0;
  const exact = chosen.every((r,i)=>r===item.steps[i]);
  if(exact) points=1;
  else{
    const sortedChosen=[...chosen].sort(), sortedTarget=[...item.steps].sort();
    const sameSet = JSON.stringify(sortedChosen)===JSON.stringify(sortedTarget);
    if(sameSet) points=0.5;
  }
  state.scores.workflow += points;
  beep(exact?660:points>0?450:280, 0.12);

  const orderNames = item.steps.map(r=>ROLES[r].icon+" "+ROLES[r].name).join("  →  ");
  document.getElementById("revealZone").innerHTML = `
    <div class="reveal">
      <div class="stamp">${exact? "Perfect Route": points>0 ? "Right People, Reorder Needed":"Rerouted"}</div>
      <h4>✓ Common route</h4>
      <p>${orderNames}</p>
      <p>${item.why}</p>
    </div>
    <div class="actions"><button class="btn" onclick="advance('s2')">Next task →</button></div>
  `;
  document.getElementById("submitBtn2").disabled=true;
}

/* ---------------- STAGE 3 ---------------- */
function renderStage3(){
  const item = state.s3[state.round];
  state.currentSelect=[];
  app.innerHTML = `
    ${ledger()}
    <div class="ticket">
      <div class="ticket-num mono">${ticketNum()}</div>
      <div class="ticket-label">Bigger Situation</div>
      <div class="ticket-text">${item.text}</div>
    </div>
    <div class="hint">Select up to four roles who should be involved. Think about who leads and who supports.</div>
    <div class="counter" id="counter3">0 / 4 selected</div>
    <div class="role-bank" id="bank">${ROLE_IDS.map(id=>roleCardHTML(id)).join("")}</div>
    <div class="actions">
      <button class="btn-ghost" onclick="renderStage3()">Clear</button>
      <button class="btn" id="submitBtn3" disabled onclick="submitStage3()">Confirm team</button>
    </div>
    <div id="revealZone"></div>
  `;
}
function toggleStage3Role(id){
  const idx = state.currentSelect.indexOf(id);
  if(idx>-1){
    state.currentSelect.splice(idx,1);
  } else {
    if(state.currentSelect.length>=4) return;
    state.currentSelect.push(id);
  }
  document.querySelectorAll("#bank .role-card").forEach(c=>{
    c.classList.toggle("selected", state.currentSelect.includes(c.dataset.role));
  });
  document.getElementById("counter3").textContent = `${state.currentSelect.length} / 4 selected`;
  document.getElementById("submitBtn3").disabled = state.currentSelect.length===0;
  beep(480,0.04);
}

function submitStage3(){
  const item = state.s3[state.round];
  const chosen = [...state.currentSelect];
  state.s3picks.push(chosen);
  const ideal = [item.primary, ...item.supporting];
  const intersection = chosen.filter(r=>ideal.includes(r));
  const union = new Set([...chosen, ...ideal]);
  const jaccard = intersection.length / union.size;
  state.scores.collaboration += jaccard;

  let delegationPts=0;
  if(chosen.length<=1){ delegationPts=0; state.underCollabCount++; }
  else if(chosen.length===2){ delegationPts=0.5; }
  else{ delegationPts=1; }
  state.scores.delegation += delegationPts;

  beep(jaccard>0.6?660:jaccard>0.2?450:280,0.12);

  const idealNames = ideal.map(r=>ROLES[r].icon+" "+ROLES[r].name).join(", ");
  document.getElementById("revealZone").innerHTML = `
    <div class="reveal">
      <div class="stamp">${jaccard>0.7?"Strong Team":jaccard>0.3?"Partial Match":"Under-staffed"}</div>
      <h4>✓ Primary Owner: ${ROLES[item.primary].name}</h4>
      <p><strong>Typically involved:</strong> ${idealNames}</p>
      <p><strong>Possible flow:</strong> ${item.flow}</p>
    </div>
    <div class="actions"><button class="btn" onclick="advance('s3')">Next situation →</button></div>
  `;
  document.getElementById("submitBtn3").disabled=true;
}

/* ---------------- FLOW CONTROL ---------------- */
function advance(fromStage){
  state.round++;
  if(state.round>=3){
    state.round=0;
    if(state.stage===1){ state.stage=2; state.screen="s2"; renderStage2(); }
    else if(state.stage===2){ state.stage=3; state.screen="s3"; renderStage3(); }
    else{ state.screen="results"; renderResults(); }
  } else {
    if(fromStage==="s1") renderStage1();
    if(fromStage==="s2") renderStage2();
    if(fromStage==="s3") renderStage3();
  }
}

/* ---------------- RESULTS ---------------- */
function pct(n,max){ return Math.round((n/max)*100); }

function renderResults(){
  const o = pct(state.scores.ownership,3);
  const w = pct(state.scores.workflow,3);
  const c = pct(state.scores.collaboration,3);
  const d = pct(state.scores.delegation,3);
  const cats = [
    {label:"Ownership", val:o, color:"var(--gold)"},
    {label:"Delegation", val:d, color:"var(--amber)"},
    {label:"Collaboration", val:c, color:"var(--teal)"},
    {label:"Workflow Thinking", val:w, color:"var(--purple)"}
  ];
  const best = [...cats].sort((a,b)=>b.val-a.val)[0];
  const worst = [...cats].sort((a,b)=>a.val-b.val)[0];

  const overText = state.overAssignCount>0
    ? `In ${state.overAssignCount} of 3 ownership scenarios, you tended to keep the task with yourself when a specialist was actually the better fit — a common habit when you're used to doing everything.`
    : `You rarely defaulted to owning things yourself when a specialist was the better fit — a sign you're comfortable letting go of tasks.`;

  const underText = state.underCollabCount>0
    ? `In ${state.underCollabCount} of 3 bigger situations, you brought in fewer people than the situation really called for. Complex problems often need more hands than they first appear to.`
    : `You generally reached for enough support in the bigger situations, rather than trying to handle them solo.`;

  const insights = [
    "Many real workplace problems are solved by teams rather than individuals.",
    "Ownership doesn't mean doing the work alone — it means making sure it gets done well.",
    "The right routing often matters as much as the right person.",
    "Small businesses grow by learning what to hand off, not just what to do."
  ];
  const insight = insights[Math.floor(Math.random()*insights.length)];

  app.innerHTML = `
    <div class="eyebrow">Results</div>
    <h1 class="brand display">How you run the shop</h1>
    <div class="subtitle">A read on how you think about ownership, delegation, and collaboration — not a score to beat.</div>
    <div class="panel">
      <div class="bars">
        ${cats.map(c=>`
          <div class="bar-row">
            <div class="bar-label">${c.label}</div>
            <div class="bar-track"><div class="bar-fill" style="background:${c.color}" data-target="${c.val}"></div></div>
            <div class="bar-val mono">${c.val}%</div>
          </div>`).join("")}
      </div>
      <div class="reflect-block">
        <div class="tag">What you understood well</div>
        <p>Your strongest category was <strong>${best.label}</strong> at ${best.val}% — you consistently reasoned well about who should be involved and why.</p>
      </div>
      <div class="reflect-block">
        <div class="tag">Where you tended to over-assign responsibility</div>
        <p>${overText}</p>
      </div>
      <div class="reflect-block">
        <div class="tag">Where you underestimated collaboration</div>
        <p>${underText}</p>
      </div>
      <div class="reflect-block">
        <div class="tag">One insight</div>
        <p>${insight}</p>
      </div>
      <div class="actions">
        <button class="btn" onclick="restart()">Play again</button>
      </div>
    </div>
  `;
  requestAnimationFrame(()=>{
    document.querySelectorAll(".bar-fill").forEach(el=>{
      const t = el.dataset.target;
      setTimeout(()=>{ el.style.width = t+"%"; }, 60);
    });
  });
  if(best.val>=70) launchConfetti();
}

function launchConfetti(){
  const wrap = document.createElement("div");
  wrap.className="confetti-wrap";
  document.body.appendChild(wrap);
  const colors=["#c9a961","#4a9b8e","#e8a355","#b98cd6","#59b3c9"];
  for(let i=0;i<40;i++){
    const el=document.createElement("div");
    el.className="confetti";
    el.style.left=Math.random()*100+"vw";
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration=(2+Math.random()*1.5)+"s";
    el.style.animationDelay=(Math.random()*0.6)+"s";
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.remove(),4000);
}

function restart(){
  state = {
    screen:"intro", round:0, stage:1, s1:[], s2:[], s3:[],
    s1picks:[], s2picks:[], s3picks:[],
    scores:{ownership:0, workflow:0, collaboration:0, delegation:0},
    overAssignCount:0, underCollabCount:0, armedRole:null,
    currentSlots:[], currentSelect:[]
  };
  renderIntro();
}

/* ---------------- INIT ---------------- */
renderIntro();
</script>
</body>
</html>
