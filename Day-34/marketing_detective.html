<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective — Case Files</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<style>
/* ===================== TOKENS ===================== */
:root{
  --midnight:#0a0e1a;
  --midnight-2:#0f1526;
  --steel:#152036;
  --steel-2:#1c2b4a;
  --steel-3:#233658;
  --manila:#d9c9a0;
  --manila-dark:#c4b285;
  --paper:#ece4d0;
  --silver:#b8c4d9;
  --silver-dim:#7c8ba8;
  --ink:#1c1a14;
  --glow:#5ec8d8;
  --glow-2:#8fe0ec;
  --stamp-red:#a8342f;
  --stamp-red-2:#c94641;
  --gold:#c9a24b;
  --text-light:#e7ecf6;
  --text-dim:#9aa7c2;
  --success:#5bbf8a;
  --danger:#c85a5a;
  --font-display: Georgia, 'Times New Roman', serif;
  --font-type: 'Courier New', Courier, monospace;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(94,200,216,0.06), transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(94,200,216,0.05), transparent 55%),
    var(--midnight);
  color:var(--text-light);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
}
#root{min-height:100vh;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--midnight-2);}
::-webkit-scrollbar-thumb{background:var(--steel-3);border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--glow);}

button{font-family:inherit;cursor:pointer;}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;}

/* ===================== NOISE / TEXTURE ===================== */
.grain{
  position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.035;mix-blend-mode:overlay;
  background-image:
    repeating-radial-gradient(circle at 10% 20%, #fff 0, transparent 1px),
    repeating-radial-gradient(circle at 80% 60%, #fff 0, transparent 1px),
    repeating-radial-gradient(circle at 40% 90%, #fff 0, transparent 1px);
  background-size: 3px 3px, 5px 5px, 4px 4px;
}

.cork-texture{
  background-color:var(--steel);
  background-image:
    radial-gradient(circle at 15% 25%, rgba(255,255,255,0.025) 0, transparent 3%),
    radial-gradient(circle at 85% 15%, rgba(255,255,255,0.02) 0, transparent 3%),
    radial-gradient(circle at 45% 65%, rgba(255,255,255,0.025) 0, transparent 3%),
    radial-gradient(circle at 75% 80%, rgba(255,255,255,0.02) 0, transparent 3%),
    radial-gradient(circle at 25% 85%, rgba(255,255,255,0.02) 0, transparent 3%),
    radial-gradient(circle at 60% 40%, rgba(255,255,255,0.02) 0, transparent 3%),
    linear-gradient(160deg, var(--steel) 0%, var(--steel-2) 100%);
}

/* ===================== LAYOUT SHELL ===================== */
.app-shell{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:linear-gradient(180deg, rgba(10,14,26,0.95), rgba(10,14,26,0.75));
  border-bottom:1px solid rgba(94,200,216,0.15);
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(6px);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-badge{
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--glow-2), var(--glow) 55%, #1a5d68 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 0 18px rgba(94,200,216,0.5);
  color:#08202a;font-weight:bold;
}
.brand-text h1{font-size:20px;letter-spacing:1px;color:var(--text-light);}
.brand-text span{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}

.progress-track{display:flex;gap:6px;align-items:center;}
.progress-dot{
  width:9px;height:9px;border-radius:50%;background:var(--steel-3);
  transition:all .4s ease;border:1px solid rgba(184,196,217,0.2);
}
.progress-dot.active{background:var(--glow);box-shadow:0 0 10px var(--glow);}
.progress-dot.done{background:var(--gold);}
.progress-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-left:10px;font-family:var(--font-type);}

.stage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:32px 20px 60px;
  position:relative;
}

.fade-in{animation:fadeIn .6s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.pop-in{animation:popIn .5s cubic-bezier(.2,1.4,.4,1) both;}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

/* ===================== BUTTONS ===================== */
.btn{
  border:none;border-radius:6px;padding:13px 26px;font-size:14px;font-weight:700;
  letter-spacing:0.6px;text-transform:uppercase;transition:all .25s ease;
  font-family:var(--font-body);
}
.btn-primary{
  background:linear-gradient(135deg, var(--glow), #3aa2b3);
  color:#052228;box-shadow:0 4px 18px rgba(94,200,216,0.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(94,200,216,0.55);}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{
  background:transparent;border:1px solid rgba(184,196,217,0.35);color:var(--text-light);
}
.btn-ghost:hover{border-color:var(--glow);color:var(--glow);background:rgba(94,200,216,0.06);}
.btn-gold{
  background:linear-gradient(135deg, var(--gold), #a3792f);color:#241a05;
  box-shadow:0 4px 16px rgba(201,162,75,0.35);
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(201,162,75,0.5);}

/* ===================== SCREEN: ASSIGNMENT ===================== */
.assignment-wrap{
  max-width:760px;width:100%;margin-top:20px;
  perspective:1400px;
}
.dossier{
  background:linear-gradient(160deg, #2a2318, #211b12);
  border-radius:4px;
  box-shadow:0 25px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(201,162,75,0.15);
  padding:6px;
  position:relative;
}
.dossier-inner{
  background:var(--manila);
  color:var(--ink);
  border-radius:2px;
  padding:38px 42px;
  position:relative;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, transparent 1px, transparent 26px),
    linear-gradient(160deg, var(--manila), var(--manila-dark));
}
.dossier-stamp{
  position:absolute;top:28px;right:36px;
  border:3px solid var(--stamp-red);color:var(--stamp-red);
  font-family:var(--font-type);font-weight:bold;font-size:13px;
  padding:5px 12px;border-radius:4px;transform:rotate(-8deg);
  letter-spacing:2px;opacity:0.85;
}
.dossier-label{font-family:var(--font-type);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#6b5c3c;margin-bottom:6px;}
.dossier h2{font-size:30px;color:var(--ink);margin-bottom:2px;}
.dossier .industry{font-family:var(--font-type);font-size:13px;color:#5a4d30;margin-bottom:22px;}
.dossier-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px;}
.dossier-field{border-left:3px solid var(--stamp-red);padding-left:12px;}
.dossier-field h4{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#6b5c3c;margin-bottom:4px;}
.dossier-field p{margin:0;font-size:14.5px;line-height:1.5;color:var(--ink);}
.case-id{position:absolute;bottom:18px;right:24px;font-family:var(--font-type);font-size:11px;color:#8a7a52;}

.assignment-actions{display:flex;justify-content:center;margin-top:34px;gap:14px;}

/* ===================== SCREEN: BOARD ===================== */
.board-wrap{width:100%;max-width:1100px;}
.board-heading{text-align:center;margin-bottom:26px;}
.board-heading h2{font-size:26px;color:var(--text-light);letter-spacing:0.5px;}
.board-heading p{color:var(--text-dim);font-size:14px;margin-top:6px;font-family:var(--font-type);}

.corkboard{
  border-radius:10px;
  padding:34px;
  position:relative;
  box-shadow:inset 0 0 60px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.45);
  border:10px solid #0d1830;
}
.folder-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:26px;
}
.folder-card{
  background:linear-gradient(160deg, var(--manila), var(--manila-dark));
  color:var(--ink);border-radius:3px;padding:20px 18px 22px;
  position:relative;cursor:pointer;
  box-shadow:0 10px 22px rgba(0,0,0,0.35);
  transition:transform .3s ease, box-shadow .3s ease;
  border-top:26px solid var(--manila-dark);
  min-height:120px;
}
.folder-card:before{
  content:attr(data-tab);
  position:absolute;top:-24px;left:16px;
  font-family:var(--font-type);font-size:11px;font-weight:bold;
  color:#4a3f26;letter-spacing:1px;
}
.folder-card:hover{transform:translateY(-6px) rotate(-0.6deg);box-shadow:0 18px 34px rgba(0,0,0,0.5);}
.folder-card.visited{outline:2px solid var(--success);outline-offset:2px;}
.folder-card h3{font-size:16px;margin-bottom:8px;color:var(--ink);}
.folder-card .hint{font-size:12.5px;color:#5a4d30;line-height:1.4;}
.folder-card .check{position:absolute;top:10px;right:12px;color:var(--success);font-weight:bold;font-size:16px;opacity:0;transition:opacity .3s;}
.folder-card.visited .check{opacity:1;}
.pin{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff8a80, var(--stamp-red) 70%);
  box-shadow:0 3px 6px rgba(0,0,0,0.5);
  z-index:5;
}

.board-footer{display:flex;justify-content:center;margin-top:32px;}

/* modal (evidence detail) */
.modal-overlay{
  position:fixed;inset:0;background:rgba(4,6,14,0.78);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;
  animation:fadeIn .25s ease both;
}
.modal-card{
  max-width:560px;width:100%;background:var(--paper);color:var(--ink);
  border-radius:4px;padding:30px 32px;position:relative;
  box-shadow:0 30px 70px rgba(0,0,0,0.6);
  max-height:82vh;overflow-y:auto;
}
.modal-card h3{font-size:20px;margin-bottom:14px;color:var(--ink);border-bottom:2px solid var(--stamp-red);padding-bottom:10px;}
.modal-card .close-x{position:absolute;top:14px;right:18px;font-size:20px;color:#5a4d30;background:none;border:none;}
.modal-card .content-line{margin-bottom:10px;font-size:14.5px;line-height:1.55;}
.modal-card .content-line b{color:#4a3f26;}
.comment-item{
  background:rgba(0,0,0,0.05);border-left:3px solid var(--stamp-red);
  padding:8px 12px;margin-bottom:8px;border-radius:2px;font-style:italic;font-size:13.5px;
}
.social-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed rgba(0,0,0,0.15);font-size:13.5px;}
.metric-bars{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.metric-row{display:grid;grid-template-columns:110px 1fr 90px;align-items:center;gap:10px;font-size:13px;}
.metric-bar-track{height:10px;background:rgba(0,0,0,0.1);border-radius:6px;overflow:hidden;}
.metric-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--stamp-red),#e0837f);width:0;transition:width 1.1s cubic-bezier(.2,.8,.3,1);}
.channel-chip{display:inline-block;padding:4px 10px;background:rgba(0,0,0,0.08);border-radius:20px;font-size:12px;margin:3px 4px 3px 0;font-family:var(--font-type);}

.modal-footer{margin-top:18px;display:flex;justify-content:flex-end;}

/* ===================== SCREEN: INVESTIGATE (drag) ===================== */
.investigate-wrap{width:100%;max-width:1150px;}
.investigate-columns{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:10px;}
@media (max-width:860px){.investigate-columns{grid-template-columns:1fr;}}

.evidence-pile{
  background:var(--steel);border-radius:10px;padding:20px;
  box-shadow:inset 0 0 40px rgba(0,0,0,0.4);
  min-height:420px;
}
.evidence-pile h3, .evidence-board h3{
  font-family:var(--font-type);font-size:13px;text-transform:uppercase;letter-spacing:2px;
  color:var(--glow);margin-bottom:16px;
}
.evidence-card{
  background:linear-gradient(160deg,#fdf8e8,#f0e6c8);
  color:var(--ink);border-radius:3px;padding:14px 16px;margin-bottom:12px;
  cursor:grab;box-shadow:0 6px 14px rgba(0,0,0,0.35);
  transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  border:1px solid rgba(0,0,0,0.08);
  transform:rotate(var(--rot,0deg));
}
.evidence-card:hover{transform:translateY(-3px) rotate(0deg);box-shadow:0 12px 22px rgba(0,0,0,0.45);}
.evidence-card.dragging{opacity:0.35;}
.evidence-card .e-tag{font-family:var(--font-type);font-size:10.5px;text-transform:uppercase;color:var(--stamp-red);letter-spacing:1px;display:block;margin-bottom:4px;}
.evidence-card .e-title{font-weight:bold;font-size:14px;margin-bottom:3px;}
.evidence-card .e-desc{font-size:12.5px;color:#4a4331;line-height:1.4;}

.evidence-board{
  background:var(--cork,var(--steel));
  border-radius:10px;padding:20px;position:relative;
  min-height:420px;
  border:2px dashed rgba(94,200,216,0.25);
  background-image:radial-gradient(circle at 30% 20%, rgba(94,200,216,0.05), transparent 50%);
}
.evidence-board.drag-over{border-color:var(--glow);box-shadow:0 0 26px rgba(94,200,216,0.35) inset;}
.dropped-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dropped-slot{
  min-height:74px;border-radius:6px;border:1px dashed rgba(184,196,217,0.25);
  display:flex;align-items:center;justify-content:center;padding:8px;
  font-family:var(--font-type);font-size:11px;color:var(--text-dim);text-align:center;
}
.dropped-item{
  background:linear-gradient(160deg,#fdf8e8,#f0e6c8);color:var(--ink);border-radius:4px;
  padding:9px 10px;width:100%;font-size:12px;box-shadow:0 4px 10px rgba(0,0,0,0.3);
  animation:popIn .35s ease both;
}
.dropped-item b{display:block;font-size:12.5px;margin-bottom:2px;}

.torch-layer{
  position:absolute;inset:0;pointer-events:none;border-radius:10px;
  background:radial-gradient(circle 220px at var(--mx,50%) var(--my,50%), transparent 0%, rgba(5,8,16,0.0) 40%, rgba(5,8,16,0.55) 78%);
}

.investigate-progress{
  margin-top:22px;display:flex;flex-direction:column;align-items:center;gap:10px;
}
.investigate-progress .bar-track{width:320px;max-width:80vw;height:8px;border-radius:6px;background:var(--steel-3);overflow:hidden;}
.investigate-progress .bar-fill{height:100%;background:linear-gradient(90deg,var(--glow),var(--glow-2));border-radius:6px;transition:width .4s ease;}
.investigate-progress span{font-family:var(--font-type);font-size:12px;color:var(--text-dim);}

.investigate-actions{display:flex;justify-content:center;margin-top:26px;}

/* ===================== SCREEN: SOLVE ===================== */
.solve-wrap{max-width:760px;width:100%;}
.solve-header{text-align:center;margin-bottom:26px;}
.solve-header h2{font-size:26px;}
.solve-header p{color:var(--text-dim);font-family:var(--font-type);font-size:13px;margin-top:6px;}
.option-list{display:flex;flex-direction:column;gap:14px;}
.option-card{
  background:var(--steel);border:2px solid var(--steel-3);border-radius:8px;
  padding:16px 20px;cursor:pointer;transition:all .25s ease;position:relative;
  display:flex;align-items:flex-start;gap:14px;
}
.option-card:hover{border-color:var(--glow);transform:translateX(4px);}
.option-card.selected{border-color:var(--glow);box-shadow:0 0 22px rgba(94,200,216,0.3);background:var(--steel-2);}
.option-letter{
  width:30px;height:30px;border-radius:50%;background:var(--steel-3);color:var(--text-light);
  display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0;
  font-family:var(--font-type);
}
.option-card.selected .option-letter{background:var(--glow);color:#052228;}
.option-text{font-size:14.5px;line-height:1.5;color:var(--text-light);padding-top:3px;}

.solve-submit{display:flex;justify-content:center;margin-top:28px;}

/* ===================== SCREEN: CASE CLOSED ===================== */
.closed-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;position:relative;
}
.stamp-big{
  font-family:var(--font-type);font-weight:bold;
  font-size:clamp(38px,8vw,68px);
  border:6px solid var(--stamp-red);color:var(--stamp-red);
  padding:10px 28px;border-radius:10px;letter-spacing:6px;
  transform:rotate(-9deg) scale(0);
  animation:stampIn .55s .15s cubic-bezier(.2,1.8,.4,1) forwards;
  box-shadow:0 0 40px rgba(168,52,47,0.35);
}
@keyframes stampIn{
  0%{transform:rotate(-9deg) scale(2.4);opacity:0;}
  60%{transform:rotate(-9deg) scale(0.92);opacity:1;}
  100%{transform:rotate(-9deg) scale(1);opacity:1;}
}
.closed-verdict{margin-top:26px;font-size:16px;color:var(--text-dim);font-family:var(--font-type);opacity:0;animation:fadeIn .6s .7s ease forwards;}
.closed-verdict b{color:var(--text-light);}
.closed-continue{margin-top:30px;opacity:0;animation:fadeIn .6s 1.1s ease forwards;}

/* ===================== SCREEN: REPORT ===================== */
.report-wrap{max-width:820px;width:100%;}
.report-header{text-align:center;margin-bottom:20px;}
.report-header h2{font-size:26px;}
.report-score{
  display:flex;justify-content:center;gap:36px;margin:18px 0 30px;flex-wrap:wrap;
}
.score-chip{
  background:var(--steel);border-radius:10px;padding:16px 26px;text-align:center;min-width:130px;
  box-shadow:inset 0 0 0 1px rgba(184,196,217,0.08);
}
.score-chip .val{font-size:28px;font-weight:bold;color:var(--glow);font-family:var(--font-type);}
.score-chip .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-top:4px;}

.report-section{
  background:var(--steel);border-radius:10px;padding:22px 26px;margin-bottom:18px;
  border-left:4px solid var(--glow);
}
.report-section h3{font-size:15px;text-transform:uppercase;letter-spacing:1.5px;color:var(--glow);margin-bottom:12px;font-family:var(--font-type);}
.report-section p{margin:0;font-size:14.5px;line-height:1.6;color:var(--text-light);}
.improve-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
.improve-list li{
  display:flex;gap:10px;font-size:14.5px;line-height:1.5;color:var(--text-light);
  background:rgba(94,200,216,0.05);padding:10px 14px;border-radius:6px;
}
.improve-list li:before{content:"✓";color:var(--success);font-weight:bold;}
.clue-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.clue-list li{font-size:14px;color:var(--text-dim);padding-left:16px;position:relative;}
.clue-list li:before{content:"—";position:absolute;left:0;color:var(--glow);}

.report-actions{display:flex;justify-content:center;gap:16px;margin-top:30px;flex-wrap:wrap;}

/* misc */
.small-note{
  text-align:center;color:var(--text-dim);font-size:12px;margin-top:14px;font-family:var(--font-type);
}
</style>
</head>
<body>
<div class="grain"></div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef, useMemo, useCallback} = React;

/* ============================================================
   CASE DATA — 12 fictional marketing investigation cases
   ============================================================ */
const CASES = [
{
  id:"CF-101", company:"LumaBrew Coffee Co.", industry:"Food & Beverage — Specialty Coffee",
  objective:"Drive foot traffic to 40 new urban café locations within Q1.",
  audience:"Young professionals aged 24–35 in metro areas who value convenience and premium taste.",
  channels:["Instagram Ads","Influencer Seeding","Local Radio Spots","Geo-targeted Push Notifications"],
  budget:{"Instagram Ads":45,"Influencer Seeding":30,"Local Radio Spots":15,"Geo-targeted Push Notifications":10},
  metrics:{reach:"3.1M impressions", ctr:"0.6%", engagement:"18,400 interactions", conversions:"2,150 store visits (0.9% of reach)", sales:"$61,200 in first-month revenue"},
  comments:[

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pickCase(excludeId){
  let pool = CASES;
  if(excludeId){ pool = CASES.filter(c=>c.id!==excludeId); }
  return pool[Math.floor(Math.random()*pool.length)];
}
function metricPercent(str){
  // crude heuristic to turn a metric string into a 0-100 bar width for visual flavor
  const m = str.match(/([\d.]+)%/);
  if(m) return Math.min(100, parseFloat(m[1])*22);
  const m2 = str.match(/([\d,.]+)/);
  if(m2){
    const num = parseFloat(m2[1].replace(/,/g,""));
    return Math.min(100, Math.log10(num+1)*14);
  }
  return 40;
}

  return (
    <div className="topbar">
      <div className="brand">
        <div className="brand-badge">🔍</div>
        <div className="brand-text">
          <h1>Marketing Detective</h1>
          <span>{caseId ? `Case File ${caseId}` : "Bureau of Campaign Investigations"}</span>
        </div>
      </div>
      <div className="progress-track">
        {STAGES.map((s,i)=>(
          <div key={s} className={"progress-dot"+(i===stageIndex?" active":i<stageIndex?" done":"")} title={s}></div>
        ))}
        <span className="progress-label">{STAGES[stageIndex]}</span>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN 1: CASE ASSIGNMENT
   ============================================================ */
function CaseAssignment({activeCase, onAccept}){
  return (
    <div className="stage">
      <div className="assignment-wrap fade-in">
        <div className="dossier">
          <div className="dossier-inner">
            <div className="dossier-stamp">CONFIDENTIAL</div>
            <div className="dossier-label">New Case Assigned</div>
            <h2>{activeCase.company}</h2>
            <div className="industry">{activeCase.industry}</div>
            <div className="dossier-grid">
              <div className="dossier-field">
                <h4>Campaign Objective</h4>
                <p>{activeCase.objective}</p>
              </div>
              <div className="dossier-field">
                <h4>Target Audience</h4>
                <p>{activeCase.audience}</p>
              </div>
            </div>
            <div className="case-id">FILE #{activeCase.id}</div>
          </div>
        </div>
        <div className="assignment-actions">
          <button className="btn btn-primary" onClick={onAccept}>Accept the Case</button>
        </div>
        <p className="small-note">A campaign has gone wrong somewhere. Your job: find where, and why.</p>
      </div>
    </div>
  );
}

/* ============================================================
   EVIDENCE MODAL (used by Board)
   ============================================================ */
function EvidenceModal({category, activeCase, onClose}){
  const c = activeCase;
  let body = null;

  if(category==="channels"){
    body = (
      <div>
        {c.channels.map(ch=>(
          <span className="channel-chip" key={ch}>{ch} — {c.budget[ch]}%</span>
        ))}
      </div>
    );
  } else if(category==="metrics"){
    const rows = [
      ["Reach", c.metrics.reach],
      ["CTR", c.metrics.ctr],
      ["Engagement", c.metrics.engagement],
      ["Conversions", c.metrics.conversions],
      ["Sales", c.metrics.sales],
    ];
    body = (
      <div className="metric-bars">
        {rows.map(([label,val])=>(
          <div className="metric-row" key={label}>
            <span>{label}</span>
            <div className="metric-bar-track"><MetricBar value={metricPercent(val)} /></div>
            <span style={{fontSize:"11.5px",textAlign:"right"}}>{val.length>22?val.slice(0,22)+"…":val}</span>
          </div>
        ))}
        <p style={{fontSize:"12.5px",color:"#5a4d30",marginTop:"6px"}}>
          {rows.map(([l,v])=><span key={l} style={{display:"block"}}><b>{l}:</b> {v}</span>)}
        </p>
      </div>
    );
  } else if(category==="comments"){
    body = (
      <div>
        {c.comments.map((cm,i)=>(
          <div className="comment-item" key={i}>{cm}</div>
        ))}
      </div>
    );
  } else if(category==="social"){
    body = (
      <div>
        {Object.entries(c.social).map(([platform,val])=>(
          <div className="social-row" key={platform}><b>{platform}</b><span>{val}</span></div>
        ))}
      </div>
    );
  } else if(category==="budget"){
    body = (
      <div className="metric-bars">
        {Object.entries(c.budget).map(([ch,pct])=>(
          <div className="metric-row" key={ch}>
            <span>{ch}</span>
            <div className="metric-bar-track"><MetricBar value={pct} /></div>
            <span>{pct}%</span>
          </div>
        ))}
      </div>
    );
  }

  const titles = {
    channels:"Marketing Channels Used",
    metrics:"Campaign Performance Metrics",
    comments:"Customer Comments (Field Interviews)",
    social:"Social Media Performance",
    budget:"Budget Allocation Breakdown"
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card pop-in" onClick={e=>e.stopPropagation()}>
        <button className="close-x" onClick={onClose}>✕</button>
        <h3>{titles[category]}</h3>
        {body}
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Close File</button>
        </div>
      </div>
    </div>
  );
}

function MetricBar({value}){
  const ref = useRef(null);
  useEffect(()=>{
    const t = setTimeout(()=>{ if(ref.current) ref.current.style.width = value+"%"; }, 60);
    return ()=>clearTimeout(t);
  },[value]);
  return <div className="metric-bar-fill" ref={ref}></div>;
}

/* ============================================================
   SCREEN 2: INVESTIGATION BOARD
   ============================================================ */
function InvestigationBoard({activeCase, visited, onVisit, onContinue}){
  const [openCategory, setOpenCategory] = useState(null);
  const folders = [
    {key:"channels", tab:"EXHIBIT A", title:"Marketing Channels", hint:"Where the campaign ran."},
    {key:"budget", tab:"EXHIBIT B", title:"Budget Allocation", hint:"Where the money went."},
    {key:"metrics", tab:"EXHIBIT C", title:"Campaign Metrics", hint:"Reach, CTR, conversions & sales."},
    {key:"comments", tab:"EXHIBIT D", title:"Customer Comments", hint:"What real customers said."},
    {key:"social", tab:"EXHIBIT E", title:"Social Performance", hint:"Platform-by-platform sentiment."},
  ];
  const allVisited = folders.every(f=>visited.has(f.key));

  return (
    <div className="stage">
      <div className="board-wrap fade-in">
        <div className="board-heading">
          <h2>Investigation Board</h2>
          <p>Open every exhibit folder before proceeding to the evidence board.</p>
        </div>
        <div className="corkboard cork-texture">
          <div className="folder-grid">
            {folders.map(f=>(
              <div
                key={f.key}
                className={"folder-card"+(visited.has(f.key)?" visited":"")}
                data-tab={f.tab}
                onClick={()=>{ setOpenCategory(f.key); onVisit(f.key); }}
              >
                <div className="pin"></div>
                <span className="check">✔</span>
                <h3>{f.title}</h3>
                <p className="hint">{f.hint}</p>
              </div>
            ))}
          </div>
        </div>
        <div className="board-footer">
          <button className="btn btn-primary" disabled={!allVisited} onClick={onContinue}>
            {allVisited ? "Proceed to Evidence Board →" : "Open all exhibits to continue"}
          </button>
        </div>
      </div>
      {openCategory && (
        <EvidenceModal category={openCategory} activeCase={activeCase} onClose={()=>setOpenCategory(null)} />
      )}
    </div>
  );
}

/* ============================================================
   SCREEN 3: INTERACTIVE INVESTIGATION (drag & drop)
   ============================================================ */
function buildEvidenceItems(c){
  return [
    {id:"reach", tag:"Metric", title:"Reach", desc:c.metrics.reach},
    {id:"ctr", tag:"Metric", title:"CTR", desc:c.metrics.ctr},
    {id:"engagement", tag:"Metric", title:"Engagement", desc:c.metrics.engagement},
    {id:"conversions", tag:"Metric", title:"Conversions", desc:c.metrics.conversions},
    {id:"sales", tag:"Metric", title:"Sales", desc:c.metrics.sales},
    {id:"comment1", tag:"Testimony", title:"Customer Comment", desc:c.comments[0]},
    {id:"comment2", tag:"Testimony", title:"Customer Comment", desc:c.comments[1]},
    {id:"social", tag:"Social", title:"Social Snapshot", desc:Object.entries(c.social).map(([p,v])=>p+": "+v).join(" · ")},
  ];
}

/* ============================================================
   SCREEN 4: SOLVE THE CASE
   ============================================================ */
function SolveCase({activeCase, onSolve}){
  // mistakeOptions[0] is always the correct answer before shuffling; tag correctness
  // positionally rather than by exact text match, since the Learning Report uses a
  // more detailed phrasing of the same mistake than the concise multiple-choice option.
  const options = useMemo(()=>{
    const tagged = activeCase.mistakeOptions.map((text,i)=>({text, correct:i===0}));
    return shuffle(tagged);
  }, [activeCase]);
  const [selected, setSelected] = useState(null);
  const letters = ["A","B","C","D"];

  return (
    <div className="stage">
      <div className="solve-wrap fade-in">
        <div className="solve-header">
          <h2>Solve the Case</h2>
          <p>What was the primary marketing mistake in the {activeCase.company} campaign?</p>
        </div>
        <div className="option-list">
          {options.map((opt,i)=>(
            <div
              key={i}
              className={"option-card"+(selected===opt?" selected":"")}
              onClick={()=>setSelected(opt)}
            >
              <div className="option-letter">{letters[i]}</div>
              <div className="option-text">{opt.text}</div>
            </div>
          ))}
        </div>
        <div className="solve-submit">
          <button className="btn btn-gold" disabled={!selected} onClick={()=>onSolve(!!(selected && selected.correct))}>
            Lock In Verdict
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN 5: CASE CLOSED
   ============================================================ */
function CaseClosed({activeCase, correct, onContinue}){
  return (
    <div className="stage">
      <div className="closed-wrap">
        <div className="stamp-big">{correct ? "CASE CLOSED" : "CASE REOPENED"}</div>
        <div className="closed-verdict">
          {correct
            ? <span>Verdict: <b>Correct.</b> You identified the true mistake behind {activeCase.company}'s campaign.</span>
            : <span>Verdict: <b>Not quite.</b> The real culprit was different — full analysis in your report.</span>}
        </div>
        <div className="closed-continue">
          <button className="btn btn-primary" onClick={onContinue}>View Learning Report →</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN 6: LEARNING REPORT
   ============================================================ */
function LearningReport({activeCase, correct, examinedCount, totalEvidence, onNewCase}){
  const accuracy = correct ? 100 : 0;
  return (
    <div className="stage">
      <div className="report-wrap fade-in">
        <div className="report-header">
          <h2>Learning Report — {activeCase.company}</h2>
          <p className="small-note">File #{activeCase.id} · {activeCase.industry}</p>
        </div>

        <div className="report-score">
          <div className="score-chip">
            <div className="val">{correct ? "✔" : "✘"}</div>
            <div className="lbl">Verdict</div>
          </div>
          <div className="score-chip">
            <div className="val">{accuracy}%</div>
            <div className="lbl">Diagnosis Accuracy</div>
          </div>
          <div className="score-chip">
            <div className="val">{examinedCount}/{totalEvidence}</div>
            <div className="lbl">Evidence Examined</div>
          </div>
        </div>

        <div className="report-section">
          <h3>The Real Mistake</h3>
          <p>{activeCase.primaryMistake}</p>
        </div>

        <div className="report-section">
          <h3>Why It Happened</h3>
          <p>{activeCase.correctExplanation}</p>
        </div>

        <div className="report-section">
          <h3>Supporting Clues</h3>
          <ul className="clue-list">
            {activeCase.supportingClues.map((cl,i)=><li key={i}>{cl}</li>)}
          </ul>
        </div>

        <div className="report-section">
          <h3>Suggested Improvements</h3>
          <ul className="improve-list">
            {activeCase.improvements.map((im,i)=><li key={i}>{im}</li>)}
          </ul>
        </div>

        <div className="report-actions">
          <button className="btn btn-primary" onClick={onNewCase}>Take On a New Case</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [stage, setStage] = useState(0); // index into STAGES
  const [activeCase, setActiveCase] = useState(()=>pickCase());
  const [visited, setVisited] = useState(new Set());
  const [examinedCount, setExaminedCount] = useState(0);
  const [correct, setCorrect] = useState(false);

  const totalEvidence = useMemo(()=>buildEvidenceItems(activeCase).length, [activeCase]);

  const startNewCase = (excludeId)=>{
    setActiveCase(pickCase(excludeId));
    setVisited(new Set());
    setExaminedCount(0);
    setCorrect(false);
    setStage(0);
  };

  return (
    <div className="app-shell">
      <TopBar stageIndex={stage} caseId={stage>0?activeCase.id:null} />
      {stage===0 && (
        <CaseAssignment activeCase={activeCase} onAccept={()=>setStage(1)} />
      )}
      {stage===1 && (
        <InvestigationBoard
          activeCase={activeCase}
          visited={visited}
          onVisit={(key)=>setVisited(prev=>new Set(prev).add(key))}
          onContinue={()=>setStage(2)}
        />
      )}
      {stage===2 && (
        <EvidenceBoardWrapper
          activeCase={activeCase}
          onContinue={(count)=>{ setExaminedCount(count); setStage(3); }}
        />
      )}
      {stage===3 && (
        <SolveCase
          activeCase={activeCase}
          onSolve={(isCorrect)=>{ setCorrect(isCorrect); setStage(4); }}
        />
      )}
      {stage===4 && (
        <CaseClosed activeCase={activeCase} correct={correct} onContinue={()=>setStage(5)} />
      )}
      {stage===5 && (
        <LearningReport
          activeCase={activeCase}
          correct={correct}
          examinedCount={examinedCount}
          totalEvidence={totalEvidence}
          onNewCase={()=>startNewCase(activeCase.id)}
        />
      )}
    </div>
  );
}

/* Wrapper to capture the examined-evidence count when leaving stage 2 */
function EvidenceBoardWrapper({activeCase, onContinue}){
  const itemsTotal = useMemo(()=>buildEvidenceItems(activeCase).length, [activeCase]);
  const [count, setCount] = useState(0);
  return (
    <EvidenceBoardCounter activeCase={activeCase} itemsTotal={itemsTotal} onContinue={onContinue} />
  );
}
function EvidenceBoardCounter({activeCase, onContinue}){
  // Re-implements EvidenceBoard but reports final dropped count upward
  const items = useMemo(()=>buildEvidenceItems(activeCase), [activeCase]);
  const [remaining, setRemaining] = useState(items.map(i=>i.id));
  const [dropped, setDropped] = useState([]);
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const boardRef = useRef(null);

  const handleDrop = useCallback((e)=>{
    e.preventDefault();
    setDragOver(false);
    if(!dragId) return;
    setRemaining(r=>r.filter(id=>id!==dragId));
    setDropped(d=> d.includes(dragId) ? d : [...d, dragId]);
    setDragId(null);
  },[dragId]);

  const onTorchMove = (e)=>{
    if(!boardRef.current) return;
    const rect = boardRef.current.getBoundingClientRect();
    const x = ((e.clientX-rect.left)/rect.width*100).toFixed(1)+"%";
    const y = ((e.clientY-rect.top)/rect.height*100).toFixed(1)+"%";
    boardRef.current.style.setProperty("--mx", x);
    boardRef.current.style.setProperty("--my", y);
  };

  const pct = Math.round((dropped.length/items.length)*100);
  const canProceed = dropped.length >= Math.min(5, items.length);

  return (
    <div className="stage">
      <div className="investigate-wrap fade-in">
        <div className="board-heading">
          <h2>Interactive Investigation</h2>
          <p>Drag evidence from the case pile onto the evidence board to examine it closely.</p>
        </div>
        <div className="investigate-columns">
          <div className="evidence-pile">
            <h3>Case Evidence Pile</h3>
            {remaining.length===0 && <p style={{color:"var(--text-dim)",fontSize:"13px"}}>All evidence has been moved to the board.</p>}
            {remaining.map((id,idx)=>{
              const item = items.find(i=>i.id===id);
              const rot = ((idx%5)-2)*1.6;
              return (
                <div
                  key={id}
                  className={"evidence-card"+(dragId===id?" dragging":"")}
                  style={{"--rot":rot+"deg"}}
                  draggable
                  onDragStart={()=>setDragId(id)}
                  onDragEnd={()=>setDragId(null)}
                >
                  <span className="e-tag">{item.tag}</span>
                  <div className="e-title">{item.title}</div>
                  <div className="e-desc">{item.desc}</div>
                </div>
              );
            })}
          </div>

          <div
            className={"evidence-board"+(dragOver?" drag-over":"")}
            ref={boardRef}
            onMouseMove={onTorchMove}
            onDragOver={(e)=>{ e.preventDefault(); setDragOver(true); }}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
          >
            <div className="torch-layer"></div>
            <h3>Evidence Board</h3>
            {dropped.length===0 ? (
              <div className="dropped-slot" style={{minHeight:"300px"}}>Drop evidence here to pin it to the board</div>
            ) : (
              <div className="dropped-grid">
                {dropped.map(id=>{
                  const item = items.find(i=>i.id===id);
                  return (
                    <div className="dropped-item" key={id}>
                      <b>{item.title}</b>
                      {item.desc}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        <div className="investigate-progress">
          <div className="bar-track"><div className="bar-fill" style={{width:pct+"%"}}></div></div>
          <span>{dropped.length} / {items.length} pieces of evidence examined</span>
        </div>

        <div className="investigate-actions">
          <button className="btn btn-primary" disabled={!canProceed} onClick={()=>onContinue(dropped.length)}>
            {canProceed ? "I've Seen Enough — Solve the Case →" : `Examine at least ${Math.min(5,items.length)} pieces of evidence`}
          </button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
